<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>万达大牢</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #0a0704;
            font-family: 'Courier New', 'SF Mono', 'Fira Code', monospace;
            padding: 20px 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景画布：新设计——金属网格+光影流动+尘埃 */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            display: block;
        }

        .prison-app {
            max-width: 560px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .header {
            background: #0f0d09dd;
            backdrop-filter: blur(6px);
            border: 1px solid #7a6442;
            border-radius: 12px 12px 24px 24px;
            padding: 16px 12px;
            text-align: center;
            margin-bottom: 24px;
            box-shadow: 0 6px 0 #2b241a;
        }
        .header h1 {
            font-size: 1.6rem;
            letter-spacing: 3px;
            color: #cfb57c;
            text-shadow: 1px 1px 0 #2a1f12;
            font-weight: 700;
        }
        .header p {
            font-size: 0.7rem;
            color: #b49c64;
            background: #1e1912cc;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            margin-top: 8px;
            border-left: 1px solid #8f744a;
            border-right: 1px solid #8f744a;
        }

        .cell-card {
            background: #14110ce0;
            backdrop-filter: blur(5px);
            border: 1px solid #6f5b3b;
            border-radius: 20px;
            padding: 1.2rem 1rem;
            margin-bottom: 20px;
            box-shadow: 0 6px 0 #2a231a;
            transition: 0.15s linear;
            cursor: pointer;
            transition: transform 0.05s ease, box-shadow 0.1s;
        }
        .cell-card:active {
            transform: scale(0.99);
        }
        .cell-card:last-child {
            margin-bottom: 0;
        }

        .card-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #8e764c;
            padding-bottom: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .card-title h2 {
            font-size: 1.45rem;
            font-weight: 700;
            color: #dbbb82;
            text-shadow: 0 1px 0 #2c2218;
        }
        .badge {
            font-family: monospace;
            background: #12100c;
            padding: 3px 12px;
            border-radius: 40px;
            font-size: 0.6rem;
            color: #c9a869;
            border: 1px solid #6b5533;
        }

        .time-row {
            background: #0a0805cc;
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            padding: 6px 14px;
            border-radius: 40px;
            margin-bottom: 18px;
            color: #dbbc7c;
            border: 1px solid #5d4a2c;
        }
        .time-value {
            font-weight: bold;
            color: #f5dd9a;
            letter-spacing: 1px;
        }

        .sentence-box {
            background: #080704b3;
            border-radius: 20px;
            padding: 14px 8px;
            margin: 12px 0 12px;
            text-align: center;
            border: 1px solid #7c643e;
            box-shadow: inset 0 0 4px #00000066;
        }
        .sentence-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #cdaf74;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .units-grid {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .unit-block {
            background: #100e09;
            min-width: 70px;
            text-align: center;
            padding: 8px 4px;
            border-radius: 16px;
            border-bottom: 3px solid #9c7e4c;
            box-shadow: inset 0 1px 2px #00000055;
        }
        .unit-number {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            color: #f5dd9a;
            text-shadow: 0 0 4px #7a5c2e;
            line-height: 1.1;
        }
        .unit-name {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #bea36c;
            letter-spacing: 1px;
        }

        .served-block {
            background: #0f0d09aa;
            border-radius: 40px;
            padding: 6px 12px;
            text-align: center;
            border: 1px solid #826d45;
            margin-top: 8px;
        }
        .served-label {
            font-size: 0.6rem;
            color: #bea261;
            letter-spacing: 1px;
        }
        .served-value {
            font-size: 0.9rem;
            font-weight: bold;
            font-family: monospace;
            color: #e9cf91;
            margin-top: 3px;
        }

        .footer-tool {
            margin-top: 24px;
            background: #14110ddd;
            backdrop-filter: blur(4px);
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 18px;
            border: 1px solid #7e6842;
        }
        .live-clock {
            font-family: monospace;
            background: #080706;
            padding: 4px 14px;
            border-radius: 30px;
            color: #eed6a0;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .prison-quote {
            font-size: 0.7rem;
            color: #cfb579;
            font-style: italic;
            max-width: 60%;
            text-align: right;
        }

        .liberated {
            border: 1px solid #f7cf82;
            background: #322b20e0;
            box-shadow: 0 0 14px #dba142, inset 0 0 8px #c9923a;
            transition: 0.2s;
        }

        .copy-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2e281ec9;
            backdrop-filter: blur(8px);
            color: #f0daa5;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-family: monospace;
            border: 1px solid #b6925c;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            transition: opacity 0.2s;
            opacity: 0;
        }

        @media (max-width: 500px) {
            body { padding: 12px; }
            .unit-number { font-size: 1.5rem; }
            .unit-block { min-width: 58px; padding: 5px 2px; }
            .card-title h2 { font-size: 1.2rem; }
            .header h1 { font-size: 1.3rem; }
            .units-grid { gap: 6px; }
            .copy-toast { font-size: 0.7rem; padding: 6px 16px; white-space: nowrap; }
        }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="prison-app">
    <div class="header">
        <h1>⛓️ 铁窗岁月 ⛓️</h1>
        <p>重刑犯·关押牢房</p>
    </div>

    <div class="cell-card" id="earlyCell">
        <div class="card-title">
            <h2>早班牢房</h2>
            <div class="badge">#IN-915</div>
        </div>
        <div class="time-row">
            <span>🔒 入狱时间</span>
            <span class="time-value">10:30</span>
            <span>🔓 假释时间</span>
            <span class="time-value">21:00</span>
        </div>
        <div class="sentence-box">
            <div class="sentence-label">⌛ 剩余刑期 ⌛</div>
            <div class="units-grid" id="earlyUnits"></div>
        </div>
        <div class="served-block">
            <div class="served-label">📜 已服刑期（自入狱起）</div>
            <div class="served-value" id="earlyServed">--年 --月 --周 --日</div>
        </div>
    </div>

    <div class="cell-card" id="lateCell">
        <div class="card-title">
            <h2>晚班牢房</h2>
            <div class="badge">#IN-915</div>
        </div>
        <div class="time-row">
            <span>🔒 入狱时间</span>
            <span class="time-value">12:00</span>
            <span>🔓 假释时间</span>
            <span class="time-value">22:00</span>
        </div>
        <div class="sentence-box">
            <div class="sentence-label">⌛ 剩余刑期 ⌛</div>
            <div class="units-grid" id="lateUnits"></div>
        </div>
        <div class="served-block">
            <div class="served-label">📜 已服刑期（自入狱起）</div>
            <div class="served-value" id="lateServed">--年 --月 --周 --日</div>
        </div>
    </div>

    <div class="footer-tool">
        <div class="live-clock" id="liveClock">--:--:--</div>
        <div class="prison-quote" id="quoteText">⚙️ 光阴如铁，刑期如流 ⚙️</div>
    </div>
</div>

<script>
    // ======================= 刑期核心逻辑 =======================
    function hoursToYMWD(totalHours) {
        if (totalHours <= 0) return { years: 0, months: 0, weeks: 0, days: 0 };
        let totalDays = totalHours * 365;
        const years = Math.floor(totalDays / 365);
        let remainingDays = totalDays - (years * 365);
        const months = Math.floor(remainingDays / 30);
        remainingDays = remainingDays - (months * 30);
        const weeks = Math.floor(remainingDays / 7);
        const days = Math.floor(remainingDays % 7);
        return { years, months, weeks, days };
    }

    function formatYMWD(hours) {
        if (hours <= 0) return "0年 0月 0周 0日";
        const u = hoursToYMWD(hours);
        return `${u.years}年 ${u.months}月 ${u.weeks}周 ${u.days}日`;
    }

    function getWorkStart(shift) {
        const now = new Date();
        let hour = shift === 'early' ? 10 : 12;
        let minute = shift === 'early' ? 30 : 0;
        return new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour, minute, 0, 0);
    }
    function getOffwork(shift) {
        const now = new Date();
        let hour = shift === 'early' ? 21 : 22;
        return new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour, 0, 0, 0);
    }

    function getRemainingHours(shift) {
        const now = new Date();
        const off = getOffwork(shift);
        if (now >= off) return 0;
        return (off - now) / (1000 * 3600);
    }

    function getServedHours(shift) {
        const now = new Date();
        const start = getWorkStart(shift);
        const off = getOffwork(shift);
        if (now < start) return 0;
        if (now >= off) return (off - start) / (1000 * 3600);
        return (now - start) / (1000 * 3600);
    }

    function renderUnits(containerId, hours) {
        const container = document.getElementById(containerId);
        if (!container) return;
        const { years, months, weeks, days } = hoursToYMWD(hours);
        container.innerHTML = `
            <div class="unit-block"><div class="unit-number">${years}</div><div class="unit-name">年</div></div>
            <div class="unit-block"><div class="unit-number">${months}</div><div class="unit-name">月</div></div>
            <div class="unit-block"><div class="unit-number">${weeks}</div><div class="unit-name">周</div></div>
            <div class="unit-block"><div class="unit-number">${days}</div><div class="unit-name">日</div></div>
        `;
    }

    let lastQuoteUpdate = 0;
    const quotes = [
        "⛓️ 铁窗之内，一日如一年。",
        "⌛ 时光沙漏，刑期渐尽。",
        "🌑 放风时间未到，继续服刑。",
        "🔑 钥匙生锈，自由尚远。",
        "📖 钥匙生锈，自由尚远。",
        "⚙️ 有没有好好拉收？",
        "🕯️ 墙上的刻痕，每道都是一年。",
        "🔩 金属锈蚀，刑期未满。",
        "🌒 月升月落，铁窗依旧。",
        "⏳ 刑期未满，无人能逃。"
    ];

    let currentEarlyRemain = 0;
    let currentLateRemain = 0;

    function updateAll() {
        const now = new Date();
        const clockEl = document.getElementById('liveClock');
        if (clockEl) {
            const hh = String(now.getHours()).padStart(2,'0');
            const mm = String(now.getMinutes()).padStart(2,'0');
            const ss = String(now.getSeconds()).padStart(2,'0');
            clockEl.innerText = `${hh}:${mm}:${ss}`;
        }

        const earlyRemain = getRemainingHours('early');
        const earlyServed = getServedHours('early');
        renderUnits('earlyUnits', earlyRemain);
        document.getElementById('earlyServed').innerText = formatYMWD(earlyServed);
        
        const lateRemain = getRemainingHours('late');
        const lateServed = getServedHours('late');
        renderUnits('lateUnits', lateRemain);
        document.getElementById('lateServed').innerText = formatYMWD(lateServed);

        currentEarlyRemain = earlyRemain;
        currentLateRemain = lateRemain;

        const earlyCard = document.getElementById('earlyCell');
        const lateCard = document.getElementById('lateCell');
        if (earlyRemain <= 0) earlyCard.classList.add('liberated');
        else earlyCard.classList.remove('liberated');
        if (lateRemain <= 0) lateCard.classList.add('liberated');
        else lateCard.classList.remove('liberated');

        if (Date.now() - lastQuoteUpdate > 13000) {
            const randomIdx = Math.floor(Math.random() * quotes.length);
            const quoteSpan = document.getElementById('quoteText');
            if (quoteSpan) quoteSpan.innerText = quotes[randomIdx];
            lastQuoteUpdate = Date.now();
        }

        const quoteSpan = document.getElementById('quoteText');
        if (earlyRemain <= 0 && lateRemain <= 0) {
            if (quoteSpan && !quoteSpan.innerText.includes("全员释放")) quoteSpan.innerText = "🔓 全员释放 · 铁门大开 🔓";
        } else if (earlyRemain <= 0) {
            if (quoteSpan && !quoteSpan.innerText.includes("早班释放")) quoteSpan.innerText = "🌑 早班已释放 · 晚班继续服刑 ⛓️";
        } else if (lateRemain <= 0) {
            if (quoteSpan && !quoteSpan.innerText.includes("晚班释放")) quoteSpan.innerText = "🌘 晚班获自由 · 早班早已远去 🔑";
        }
    }

    setInterval(updateAll, 1000);
    updateAll();

    // ======================= 复制功能：仅复制剩余刑期 =======================
    function showCopyToast(message) {
        let toast = document.querySelector('.copy-toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'copy-toast';
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, 1800);
    }

    async function copyRemainingTimeOnly(remainHours) {
        const { years, months, weeks, days } = hoursToYMWD(remainHours);
        const text = `剩余刑期：${years}年 ${months}月 ${weeks}周 ${days}日`;
        try {
            await navigator.clipboard.writeText(text);
            showCopyToast(`📋 已复制：${text}`);
        } catch (err) {
            showCopyToast(`❌ 复制失败`);
        }
    }

    document.getElementById('earlyCell').addEventListener('click', (e) => {
        e.stopPropagation();
        copyRemainingTimeOnly(currentEarlyRemain);
    });
    document.getElementById('lateCell').addEventListener('click', (e) => {
        e.stopPropagation();
        copyRemainingTimeOnly(currentLateRemain);
    });

    // ======================= 全新背景：金属网格 + 浮动光尘 + 流动光影 =======================
    const canvas = document.getElementById('bgCanvas');
    let ctx = canvas.getContext('2d');
    let animationId = null;
    let particles = [];
    let lightAngle = 0;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    // 光尘粒子（悬浮微尘）
    class DustParticle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.12;
            this.speedY = (Math.random() - 0.5) * 0.08;
            this.alpha = Math.random() * 0.3 + 0.1;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0;
            if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0;
            if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(210, 180, 120, ${this.alpha * 0.6})`;
            ctx.fill();
        }
    }

    function initParticles() {
        const count = Math.min(120, Math.floor(window.innerWidth / 10));
        particles = [];
        for (let i = 0; i < count; i++) {
            particles.push(new DustParticle());
        }
    }

    // 绘制金属网格（斜线交叉，暗色质感）
    function drawMetalGrid() {
        const w = canvas.width;
        const h = canvas.height;
        const spacing = 45;
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(100, 80, 55, 0.3)';
        ctx.lineWidth = 0.8;
        for (let x = 0; x < w + spacing; x += spacing) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, h);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, x);
            ctx.lineTo(w, x);
            ctx.stroke();
        }
        // 斜向细线，增加层次
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(140, 110, 70, 0.2)';
        ctx.lineWidth = 0.5;
        for (let i = -h; i < w + h; i += 70) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i + h, h);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(i, h);
            ctx.lineTo(i + h, 0);
            ctx.stroke();
        }
    }

    // 绘制流动光影（缓慢扫过的光晕）
    function drawMovingLight() {
        lightAngle += 0.002;
        const centerX = canvas.width * (0.5 + Math.sin(lightAngle) * 0.2);
        const centerY = canvas.height * (0.4 + Math.cos(lightAngle * 0.6) * 0.15);
        const gradient = ctx.createRadialGradient(centerX, centerY, 30, centerX, centerY, canvas.width * 0.8);
        gradient.addColorStop(0, 'rgba(150, 120, 70, 0.08)');
        gradient.addColorStop(0.6, 'rgba(70, 55, 35, 0.04)');
        gradient.addColorStop(1, 'rgba(20, 18, 14, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // 绘制铁锈质感噪点
    function addRustNoise() {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            if (Math.random() < 0.02) {
                const darken = Math.random() * 20;
                data[i] = Math.max(0, data[i] - darken);     // R
                data[i+1] = Math.max(0, data[i+1] - darken * 0.8); // G
                data[i+2] = Math.max(0, data[i+2] - darken * 0.6); // B
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }

    function drawBackground() {
        if (!ctx) return;
        // 深邃基底
        ctx.fillStyle = '#050301';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 金属网格
        drawMetalGrid();
        
        // 微粒尘埃
        for (let p of particles) {
            p.update();
            p.draw();
        }
        
        // 流动光影
        drawMovingLight();
        
        // 一层极淡的暗角
        const gradientVignette = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.width*0.3, canvas.width/2, canvas.height/2, canvas.width*0.8);
        gradientVignette.addColorStop(0, 'rgba(0,0,0,0)');
        gradientVignette.addColorStop(1, 'rgba(0,0,0,0.35)');
        ctx.fillStyle = gradientVignette;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 细微铁锈噪点
        addRustNoise();
    }

    function animateBackground() {
        if (!ctx) return;
        drawBackground();
        animationId = requestAnimationFrame(animateBackground);
    }

    function initBackground() {
        resizeCanvas();
        initParticles();
        animateBackground();
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
        initParticles();
    });

    initBackground();

    window.addEventListener('beforeunload', () => {
        if (animationId) cancelAnimationFrame(animationId);
    });

    console.log("%c⛓️ 新背景：金属网格+光尘+流动光影 | 点击卡片复制剩余刑期 ⛓️", "color: #c2a15b; background:#201c14; padding:5px 12px; border-radius:30px;");
</script>
</body>
</html>
