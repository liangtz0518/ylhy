<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逍遥蜀山 · 仙风道骨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fbfbfd;            /* 苹果背景暖白 */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 2rem 1.2rem;
            line-height: 1.5;
            color: #1d1d1f;
        }

        /* 主卡片 — 纯白，无阴影，仅一层细边 */
        .card {
            max-width: 1440px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02);
            padding: 2.8rem 3rem;
            border: 1px solid #f0f0f2;
            transition: all 0.15s ease;
        }

        /* 标题区域 */
        h1 {
            font-size: 2.6rem;
            font-weight: 620;
            letter-spacing: -0.02em;
            color: #1d1d1f;
            margin-bottom: 0.15rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* 标签页 (iOS风格分段控件) */
        .tab-container {
            display: flex;
            gap: 0.5rem;
            background: #f5f5f7;
            border-radius: 48px;
            padding: 0.25rem;
            width: fit-content;
            margin: 1.8rem 0 2.2rem 0;
            border: 1px solid #eaeaea;
        }
        .tab-btn {
            padding: 0.7rem 2.2rem;
            font-size: 1rem;
            font-weight: 540;
            border-radius: 40px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #4a4a4e;
            transition: all 0.12s ease;
            letter-spacing: -0.01em;
        }
        .tab-btn.active {
            background: #ffffff;
            color: #1d1d1f;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            font-weight: 560;
        }

        /* 游戏面板容器 */
        .game-panel {
            display: none;
            margin-top: 0.5rem;
        }
        .game-panel.active {
            display: block;
        }

        /* 输入卡片 — 无底色，仅分割线 */
        .input-panel {
            background: transparent;
            border-radius: 24px;
            padding: 0.2rem 0 1.2rem 0;
            margin-bottom: 2rem;
            border: none;
            box-shadow: none;
        }

        .panel-title {
            font-weight: 550;
            font-size: 1.2rem;
            color: #1d1d1f;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            letter-spacing: -0.01em;
        }
        .panel-title::before {
            content: "▍";
            font-size: 1.8rem;
            color: #c6c6c8;
            line-height: 1;
            margin-right: 0.2rem;
        }

        /* 左右两列布局 */
        .input-row {
            display: flex;
            gap: 3rem;
        }
        .left-col {
            flex: 1.5;
            min-width: 0;
        }
        .right-col {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .right-col label {
            font-size: 0.8rem;
            font-weight: 550;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: #8e8e93;
            margin-bottom: 0.7rem;
        }

        /* 自定义文本框 — 细线，大圆角 */
        .custom-textarea {
            width: 100%;
            height: 280px;
            padding: 1.2rem;
            border: 1px solid #e6e6e8;
            border-radius: 18px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            font-size: 0.95rem;
            line-height: 1.5;
            resize: vertical;
            background: white;
            transition: border 0.1s;
            outline: none;
            color: #1d1d1f;
        }
        .custom-textarea:focus {
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        /* 左侧网格 */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.8rem 1.5rem;
        }

        .input-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-item label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: #8e8e93;
            margin-left: 0.2rem;
        }

        /* 数值输入框 — 极细边框 */
        .input-field {
            background: white;
            border: 1px solid #e6e6e8;
            border-radius: 14px;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            font-weight: 450;
            color: #1d1d1f;
            transition: border 0.1s, box-shadow 0.1s;
            outline: none;
            width: 100%;
        }
        .input-field:focus {
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }
        .input-field::placeholder {
            color: #b0b0b6;
            font-weight: 400;
        }

        /* 切换组 — 苹果分段选择器风格 */
        .toggle-group {
            display: flex;
            background: #f5f5f7;
            border-radius: 40px;
            padding: 0.2rem;
            border: 1px solid #eaeaea;
        }
        .toggle-btn {
            flex: 1;
            text-align: center;
            padding: 0.6rem 0.1rem;
            font-size: 0.9rem;
            font-weight: 520;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.12s ease;
            color: #4a4a4e;
            background: transparent;
            border: none;
            user-select: none;
        }
        .toggle-btn.active {
            background: #1d1d1f;
            color: #ffffff;
            font-weight: 560;
        }
        .toggle-btn:not(.active):hover {
            background: rgba(0,0,0,0.03);
            color: #1d1d1f;
        }

        /* 新增的预设按钮行样式 (苹果风辅助按钮) */
        .preset-row {
            grid-column: 1 / -1;
            margin-top: 0.8rem;
            padding-top: 0.5rem;
            border-top: 1px solid #efeff1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem;
        }
        .preset-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #6c6c70;
            letter-spacing: -0.2px;
            background: #f5f5f7;
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
        }
        .preset-btn {
            background: #ffffff;
            border: 1px solid #e2e2e6;
            border-radius: 40px;
            padding: 0.55rem 1.3rem;
            font-size: 0.85rem;
            font-weight: 540;
            color: #1d1d1f;
            cursor: pointer;
            transition: all 0.12s ease;
            box-shadow: 0 1px 1px rgba(0,0,0,0.02);
            letter-spacing: -0.2px;
        }
        .preset-btn:hover {
            background: #f9f9fb;
            border-color: #c6c6c8;
            transform: translateY(-1px);
        }
        .preset-btn:active {
            transform: translateY(1px);
            background: #f0f0f2;
        }

        /* 结果卡片 — 极浅灰底，干净 */
        .result-panel {
            background: #fafafc;
            border-radius: 24px;
            padding: 2rem 2.2rem;
            border: 1px solid #efeff1;
            margin: 2rem 0 1rem;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .result-header span {
            color: #1d1d1f;
            font-size: 1rem;
            font-weight: 540;
            letter-spacing: -0.01em;
            background: transparent;
            padding: 0;
        }

        #result {
            background: #ffffff;
            border-radius: 18px;
            padding: 1.8rem;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'SF Mono', Monaco, monospace;
            font-size: 0.95rem;
            line-height: 1.7;
            white-space: pre-wrap;
            border: 1px solid #efeff1;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
            max-height: 400px;
            overflow-y: auto;
        }

        /* 复制按钮 — 纯黑，极简 */
        .copy-btn {
            background: #1d1d1f;
            border: none;
            color: white;
            padding: 0.85rem 2.6rem;
            border-radius: 50px;
            font-weight: 540;
            font-size: 1rem;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: none;
            margin-top: 2rem;
            border: none;
            outline: none;
        }
        .copy-btn:hover {
            background: #2d2d2f;
            transform: scale(1.01);
        }
        .copy-btn:active {
            background: #3a3a3c;
            transform: scale(0.99);
        }

        /* 轻提示 */
        .toast {
            position: fixed;
            top: 28px;
            right: 28px;
            background: #1d1d1f;
            color: white;
            padding: 0.8rem 2.2rem;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 500;
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            z-index: 2000;
        }
        .toast.show {
            opacity: 1;
        }

        /* 分隔装饰 */
        .divider {
            height: 1px;
            background: #f0f0f0;
            margin: 2rem 0 1rem;
        }

        .footer-note {
            font-size: 0.75rem;
            color: #8e8e93;
            text-align: right;
            margin-top: 0.8rem;
        }

        @media (max-width: 900px) {
            .input-row { flex-direction: column; }
            .card { padding: 1.8rem; }
            .preset-btn { padding: 0.45rem 1rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast">方案已复制</div>
    <div class="card">
        <h1>方案生成</h1>

        <!-- 标签页切换 -->
        <div class="tab-container" id="tabContainer">
            <button class="tab-btn active" data-game="game1">逍遥蜀山</button>
            <button class="tab-btn" data-game="game2">仙风道骨</button>
        </div>

        <!-- ========= 游戏1：逍遥蜀山面板 (id统一加 _g1) ========= -->
        <div id="game1-panel" class="game-panel active">
            <div class="input-panel">
                <div class="panel-title">参数</div>
                <div class="input-row">
                    <!-- 左侧列 -->
                    <div class="left-col">
                        <div class="input-grid">
                            <!-- 三个数值 -->
                            <div class="input-item">
                                <label>充值金额</label>
                                <input type="number" id="val1_g1" class="input-field" step="1" placeholder="例：3000">
                            </div>
                            <div class="input-item">
                                <label>目前累充</label>
                                <input type="number" id="val2_g1" class="input-field" step="1" placeholder="历史充值">
                            </div>
                            <div class="input-item">
                                <label>新增序号</label>
                                <input type="number" id="val3_g1" class="input-field" min="0" step="1" placeholder="新增行数">
                            </div>
                            <!-- 自选套装 -->
                            <div class="input-item">
                                <label>自选套装</label>
                                <div class="toggle-group" id="group9_g1">
                                    <div class="toggle-btn active" data-value="是">是</div>
                                    <div class="toggle-btn" data-value="否">否</div>
                                </div>
                            </div>
                            <!-- 七个切换 -->
                            <div class="input-item">
                                <label>积分换玉</label>
                                <div class="toggle-group" id="group1_g1">
                                    <div class="toggle-btn active" data-value="是">是</div>
                                    <div class="toggle-btn" data-value="否">否</div>
                                </div>
                            </div>
                            <div class="input-item">
                                <label>定制头像</label>
                                <div class="toggle-group" id="group2_g1">
                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>
                                </div>
                            </div>
                            <div class="input-item">
                                <label>0元特权</label>
                                <div class="toggle-group" id="group3_g1">
                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>
                                </div>
                            </div>
                            <div class="input-item">
                                <label>神王特权</label>
                                <div class="toggle-group" id="group4_g1">
                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>
                                </div>
                            </div>
                            <div class="input-item">
                                <label>至尊特权</label>
                                <div class="toggle-group" id="group5_g1">
                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>
                                </div>
                            </div>
                            <div class="input-item">
                                <label>新服首日</label>
                                <div class="toggle-group" id="group6_g1">
                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>
                                </div>
                            </div>
                            <!-- 话术 -->
                            <div class="input-item">
                                <label>冠名话术</label>
                                <div class="toggle-group" id="group7_g1">
                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>
                                </div>
                            </div>
                            <div class="input-item">
                                <label>新服话术</label>
                                <div class="toggle-group" id="group8_g1">
                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>
                                </div>
                            </div>
                            <!-- 新增预设按钮行：首日1000 / 首日3000 / 单日5000 / 单日10000 -->
                            <div class="preset-row">
                                <span class="preset-label">⚡ 快捷方案</span>
                                <button class="preset-btn" data-type="first1000">首日1000</button>
                                <button class="preset-btn" data-type="first3000">首日3000</button>
                                <button class="preset-btn" data-type="single5000">单日5000</button>
                                <button class="preset-btn" data-type="single10000">单日10000</button>
                            </div>
                        </div>
                    </div>
                    <!-- 右侧自定义 -->
                    <div class="right-col">
                        <label>自定义物品 (一行一个 / 类型：物品1、物品2)</label>
                        <textarea id="customItems_g1" class="custom-textarea" placeholder="例如：
武圣关羽
金刚哪吒
齐天大圣
神通：佛怒炎莲、万紫千红"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========= 游戏2：仙风道骨面板 (id统一加 _g2) ========= -->
        <div id="game2-panel" class="game-panel">
            <div class="input-panel">
                <div class="panel-title"> 参数</div>
                <div class="input-row">
                    <div class="left-col">
                        <div class="input-grid">
                            <!-- 三个数值 -->
                            <div class="input-item">
                                <label>充值金额</label>
                                <input type="number" id="val1_g2" class="input-field" step="1" placeholder="例：3000">
                            </div>
                            <div class="input-item">
                                <label>目前累充</label>
                                <input type="number" id="val2_g2" class="input-field" step="1" placeholder="历史充值">
                            </div>
                            <div class="input-item">
                                <label>新增序号</label>
                                <input type="number" id="val3_g2" class="input-field" min="0" step="1" placeholder="新增行数">
                            </div>
                            <!-- 自选套装 -->
                            <div class="input-item">
                                <label>自选套装</label>
                                <div class="toggle-group" id="group9_g2">
                                    <div class="toggle-btn active" data-value="是">是</div>
                                    <div class="toggle-btn" data-value="否">否</div>
                                </div>
                            </div>
                            <!-- 七个切换 (仙风道骨专用) -->
                            <div class="input-item">
                                <label>真充卡</label>
                                <div class="toggle-group" id="group1_g2">
                                    <div class="toggle-btn active" data-value="是">是</div>
                                    <div class="toggle-btn" data-value="否">否</div>
                                </div>
                            </div>
                            <div class="input-item">
                                <label>定制头像</label>
                                <div class="toggle-group" id="group2_g2">
                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>
                                </div>
                            </div>
                            <div class="input-item">
                                <label>至尊特权</label>

                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>

                            </div>
                            <div class="input-item">
                                <label>羽化登仙壁画</label>
                                <div class="toggle-group" id="group4_g2">
                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>
                                </div>
                            </div>
                            <div class="input-item">
                                <label>超补特权</label>
                                <div class="toggle-group" id="group5_g2">
                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>
                                </div>
                            </div>
                            <div class="input-item">
                                <label>新服首日</label>
                                <div class="toggle-group" id="group6_g2">
                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>
                                </div>
                            </div>
                            <!-- 忽悠话术 -->
                            <div class="input-item">
                                <label>冠名话术</label>
                                <div class="toggle-group" id="group7_g2">
                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>
                                </div>
                            </div>
                            <div class="input-item">
                                <label>新服话术</label>
                                <div class="toggle-group" id="group8_g2">
                                    <div class="toggle-btn" data-value="是">是</div>
                                    <div class="toggle-btn active" data-value="否">否</div>
                                </div>
                            </div>
                            <!-- 新增预设按钮行 (仙风道骨版) -->
                            <div class="preset-row">
                                <span class="preset-label">⚡ 快捷方案</span>
                                <button class="preset-btn" data-type="first1000">首日1000</button>
                                <button class="preset-btn" data-type="first3000">首日3000</button>
                                <button class="preset-btn" data-type="single5000">单日5000</button>
                                <button class="preset-btn" data-type="single10000">单日10000</button>

                        </div>
                    </div>
                    <!-- 右侧自定义 -->
                    <div class="right-col">
                        <label>自定义物品 (一行一个 / 类型：物品1、物品2)</label>
                        <textarea id="customItems_g2" class="custom-textarea" placeholder="例如：
武圣关羽
金刚哪吒
齐天大圣
圣龙：沧溟紫龙、终焉祖龙"></textarea>

                </div>

        <!-- 共用结果区 -->
        <div class="result-panel">
            <div class="result-header">
                <span>方案</span>
            </div>
            <div id="result"></div>
            <div style="display: flex; justify-content: flex-end;">
                <button class="copy-btn" id="copyBtn">📋 复制方案</button>
            </div>
        </div>

        <div class="divider"></div>
        <div class="footer-note">方案快速生成</div>
    </div>

    <script>
        (function() {
            // --- 当前游戏标识 ---
            let currentGame = 'game1';   // 'game1' 或 'game2'

            // --- 获取标签页与面板 ---
            const tabBtns = document.querySelectorAll('.tab-btn');
            const panel1 = document.getElementById('game1-panel');
            const panel2 = document.getElementById('game2-panel');

            // 切换标签
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentGame = btn.dataset.game; // 'game1' 或 'game2'
                    if (currentGame === 'game1') {
                        panel1.classList.add('active');
                        panel2.classList.remove('active');
                    } else {
                        panel2.classList.add('active');
                        panel1.classList.remove('active');
                    }
                    updateResult(); // 刷新结果
                });
            });

            // --- 通用自定义物品解析 (支持纯文本行 + 冒号分割) ---
            function parseCustomItemsGeneric(inputText) {
                if (!inputText || !inputText.trim()) return [];
                const lines = inputText.split('\n').filter(line => line.trim() !== '');
                const result = [];
                for (const line of lines) {
                    const trimmed = line.trim();
                    const colonIndex = trimmed.indexOf('：');
                    if (colonIndex === -1) {
                        // 无冒号：整行作为一个物品
                        result.push(trimmed);
                    } else {
                        const type = trimmed.substring(0, colonIndex).trim();
                        const itemsPart = trimmed.substring(colonIndex + 1).trim();

                    switch(type) {
                        case 'first1000': presetText = presetMap.game1.first1000; break;
                        case 'first3000': presetText = presetMap.game1.first3000; break;
                        case 'single5000': presetText = presetMap.game1.single5000; break;
                        case 'single10000': presetText = presetMap.game1.single10000; break;
                        default: return;
                    }
                } else {
                    switch(type) {
                        case 'first1000': presetText = presetMap.game2.first1000; break;
                        case 'first3000': presetText = presetMap.game2.first3000; break;
                        case 'single5000': presetText = presetMap.game2.single5000; break;
                        case 'single10000': presetText = presetMap.game2.single10000; break;
                        default: return;
                    }
                }
                if (presetText) {
                    document.getElementById('result').innerText = presetText;
                }
            }

            // 绑定预设按钮事件 (独立规则)
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const type = btn.getAttribute('data-type');
                    if (type) applyPreset(type);
                });
            });

            // --- 绑定所有输入事件 (所有toggle-btn和输入框) ---
            function bindAllInputs() {
                // 所有toggle-btn（整个页面所有游戏面板的按钮）
                document.querySelectorAll('.toggle-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        // 切换本组active
                        const group = this.closest('.toggle-group');
                        if (group) {
                            group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                            this.classList.add('active');
                        }
                        updateResult();
                    });
                });

                // 所有数值输入和textarea
                const inputSelectors = [
                    'input[id^="val1_"]', 'input[id^="val2_"]', 'input[id^="val3_"]',
                    'textarea[id^="customItems_"]'
                ];
                inputSelectors.forEach(sel => {
                    document.querySelectorAll(sel).forEach(el => {
                        el.addEventListener('input', updateResult);
                        el.addEventListener('change', updateResult);
                    });
                });
            }

            // 复制提示
            const toast = document.getElementById('toast');
            function showToast(msg) {
                toast.innerText = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 1000);
            }

            document.getElementById('copyBtn').addEventListener('click', function() {
                const text = document.getElementById('result').innerText;
                if (!text) {
                    showToast('暂无方案可复制');
                    return;
                }
                navigator.clipboard.writeText(text).then(() => showToast('方案已复制'))
                    .catch(() => showToast('❌ 复制失败'));
            });

            // 初始化
            bindAllInputs();
            updateResult();
        })();
    </script>
</body>
</html>
