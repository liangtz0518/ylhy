<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --border: #e2e5ee;
    --text: #1e293b;
    --text-secondary: #64748b;
    --primary: #4f46e5;
    --primary-light: #eef2ff;
    --radius-sm: 6px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    z-index: 10;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--primary);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 16px;
  }

  .header-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .header-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* Tab Bar */
  .tab-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 44px;
    gap: 2px;
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    font-size: 13px;
    color: var(--text-secondary);
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    cursor: pointer;
    border: none;
    background: transparent;
    font-family: inherit;
    white-space: nowrap;
    transition: all 0.15s ease;
    position: relative;
    user-select: none;
  }

  .tab:hover {
    color: var(--text);
    background: #f8fafc;
  }

  .tab.active {
    color: var(--primary);
    font-weight: 600;
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 8px;
    right: 8px;
    height: 2px;
    background: var(--primary);
    border-radius: 2px 2px 0 0;
  }

  .tab-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Content */
  .content {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .game-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }

  .game-frame.active {
    display: block;
  }

  /* Loading overlay */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    transition: opacity 0.2s ease;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01"/><path d="M17 12h.01"/><path d="M7 12h.01"/></svg>
    </div>
    <div>
      <div class="header-title">资源申请</div>
      <div class="header-subtitle" id="header-count">--</div>
    </div>
  </div>
</header>

<!-- Tab Bar -->
<div class="tab-bar" id="tabBar"></div>

<!-- Content -->
<div class="content" id="content">
</div>

<!-- Loading Overlay -->
<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<script>

const GAMES = [
{ name: '逍遥蜀山·邮件', url: 'https://liangtz0518.github.io/ylhy/xyss.html', color: '#008737' },
{ name: '逍遥蜀山·算分', url: 'https://liangtz0518.github.io/ylhy/xyss1.html', color: '#008737' },
{ name: '大道争锋·邮件', url: 'https://liangtz0518.github.io/ylhy/ddzf.html', color: '#b1ad0a' },
{ name: '伏魔诀·邮件', url: 'https://liangtz0518.github.io/ylhy/fmj.html', color: '#4f46e5' },
{ name: '上古情歌·邮件', url: 'https://liangtz0518.github.io/ylhy/sgqg.html', color: '#d10606' }
  ];

  let activeIndex = -1;

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderTabs() {
    const tabBar = document.getElementById('tabBar');
    tabBar.innerHTML = GAMES.map((g, i) => `
      <button class="tab ${i === activeIndex ? 'active' : ''}" onclick="switchTab(${i})" title="${escapeHtml(g.url)}">
        <span class="tab-dot" style="background:${g.color}"></span>
        ${escapeHtml(g.name)}
      </button>
    `).join('');
  }

  function renderFrames() {
    const content = document.getElementById('content');
    content.querySelectorAll('.game-frame').forEach(el => el.remove());

    GAMES.forEach((g, i) => {
      const frame = document.createElement('iframe');
      frame.className = 'game-frame' + (i === activeIndex ? ' active' : '');
      frame.src = 'about:blank';
      frame.id = 'frame-' + i;
      frame.setAttribute('loading', 'lazy');
      content.appendChild(frame);
      if (i === activeIndex || i === activeIndex - 1 || i === activeIndex + 1) {
        loadFrame(i);
      }
    });
  }

  function loadFrame(i) {
    const frame = document.getElementById('frame-' + i);
    if (!frame || frame.dataset.loaded === '1') return;
    const g = GAMES[i];
    if (!g || !g.url) return;

    const overlay = document.getElementById('loadingOverlay');
    overlay.classList.remove('hidden');
    frame.dataset.loaded = '1';
    frame.onload = () => { overlay.classList.add('hidden'); };
    frame.onerror = () => { overlay.classList.add('hidden'); };
    frame.src = g.url;
    setTimeout(() => { overlay.classList.add('hidden'); }, 8000);
  }

  function switchTab(i) {
    if (i < 0 || i >= GAMES.length) return;
    activeIndex = i;
    document.querySelectorAll('.tab').forEach((el, idx) => el.classList.toggle('active', idx === i));
    document.querySelectorAll('.game-frame').forEach((el, idx) => el.classList.toggle('active', idx === i));
    loadFrame(i);
    if (i > 0) loadFrame(i - 1);
    if (i < GAMES.length - 1) loadFrame(i + 1);
  }

  function renderAll() {
    document.getElementById('header-count').textContent = GAMES.length > 0 ? `${GAMES.length} 个后台` : '--';
    renderTabs();
    renderFrames();
    if (activeIndex >= GAMES.length) {
      activeIndex = GAMES.length > 0 ? GAMES.length - 1 : -1;
    }
    if (GAMES.length > 0 && activeIndex < 0) {
      activeIndex = 0;
    }
    if (GAMES.length > 0) {
      document.querySelectorAll('.game-frame').forEach((el, idx) => el.classList.toggle('active', idx === activeIndex));
      document.querySelectorAll('.tab').forEach((el, idx) => el.classList.toggle('active', idx === activeIndex));
      loadFrame(activeIndex);
    }
  }

  // Keyboard shortcuts: Ctrl+1~9 to switch tabs
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.ctrlKey || e.metaKey) {
      const num = parseInt(e.key);
      if (num >= 1 && num <= 9) {
        e.preventDefault();
        switchTab(num - 1);
      }
    }
  });

  // Init
  if (GAMES.length > 0) activeIndex = 0;
  renderAll();
</script>

</body>
</html>
