    let selectedItems = [];      // 已选道具 { id, name, count }
    let selectedItemIds = new Set(); // 左侧高亮选中的道具ID

    const searchInput = document.getElementById('searchInput');
    const itemListDiv = document.getElementById('itemList');
    const selectedListDiv = document.getElementById('selectedList');
    const selectedTitleSpan = document.getElementById('selectedTitle');
    const toastDiv = document.getElementById('toast');

    function showToast(msg, isError = false) {
        toastDiv.textContent = msg;
        toastDiv.style.backgroundColor = isError ? '#b91c1c' : '#2c3e50';
        toastDiv.style.opacity = '1';
        setTimeout(() => {
            toastDiv.style.opacity = '0';
        }, 2000);
    }

    // 更新已选道具标题（显示数量）
    function updateSelectedTitle() {
        const count = selectedItems.length;
        selectedTitleSpan.textContent = `已选道具 (已有 ${count} 个)`;
    }

    // 渲染左侧列表（只有搜索框有内容时显示）
    function renderItemList() {
        const keyword = searchInput.value.trim();
        if (keyword === '') {
            itemListDiv.innerHTML = '';
            return;
        }
        const lowerKw = keyword.toLowerCase();
        const filtered = ITEM_LIBRARY.filter(item => 
            item.name.toLowerCase().includes(lowerKw) || item.id.toLowerCase().includes(lowerKw)
        );
        if (filtered.length === 0) {
            itemListDiv.innerHTML = '<div class="placeholder-text">未找到道具</div>';
            return;
        }
        itemListDiv.innerHTML = '';
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-row' + (selectedItemIds.has(item.id) ? ' selected' : '');
            div.textContent = `${item.name} (${item.id})`;
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                if (selectedItemIds.has(item.id)) {
                    selectedItemIds.delete(item.id);
                } else {
                    selectedItemIds.add(item.id);
                }
                renderItemList();
            });
            itemListDiv.appendChild(div);
        });
    }

    // 渲染右侧已选列表
    function renderSelectedList() {
        if (selectedItems.length === 0) {
            selectedListDiv.innerHTML = '<div class="placeholder-text">暂无道具</div>';
            updateSelectedTitle();
            return;
        }
        selectedListDiv.innerHTML = '';
        selectedItems.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'selected-item';
            div.innerHTML = `
                <span>${item.name} (${item.id})</span>
                <input type="number" class="item-count" data-idx="${idx}" value="${item.count}" min="1" step="1">
                <button class="remove-item" data-idx="${idx}">✕</button>
            `;
            selectedListDiv.appendChild(div);
        });
        // 数量修改
        document.querySelectorAll('.item-count').forEach(inp => {
            inp.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                const newVal = parseInt(e.target.value) || 1;
                if (selectedItems[idx]) selectedItems[idx].count = newVal;
            });
        });
        // 删除单个
        document.querySelectorAll('.remove-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                selectedItems.splice(idx, 1);
                renderSelectedList();
                renderItemList();  // 左侧
                updateSelectedTitle();
            });
        });
        updateSelectedTitle();
    }

    // 添加选中的道具
    function addSelected() {
        if (selectedItemIds.size === 0) {
            showToast('请先在左侧点击选择道具', true);
            return;
        }
        // 检查当前已选数量是否已达上限
        if (selectedItems.length >= 10) {
            showToast('食懵你啊，衰仔，最多10个啊', true);
            return;
        }
        const toAdd = [];
        for (let id of selectedItemIds) {
            const item = ITEM_LIBRARY.find(i => i.id === id);
            if (item) toAdd.push(item);
        }
        let added = 0;
        for (let item of toAdd) {
            if (selectedItems.length >= 10) {
                showToast('食懵你啊，衰仔，最多10个啊', true);
                break;
            }
            selectedItems.push({
                id: item.id,
                name: item.name,
                count: 1
            });
            added++;
        }
        if (added > 0) {
            selectedItemIds.clear();
            renderItemList();
            renderSelectedList();
            showToast(`已添加 ${added} 个道具`);
        } else {
            showToast('未添加任何道具', true);
        }
    }

    function clearSearchSelection() {
        selectedItemIds.clear();
        renderItemList();
        showToast('已清空左侧选中');
    }

    function clearAllSelected() {
        selectedItems = [];
        renderSelectedList();
        showToast('已清空全部道具');
    }

    // 生成脚本并复制
    function generateAndCopy() {
        const serverValue = document.getElementById('serverValue').value.trim();
        const roleId = document.getElementById('roleId').value.trim();

        const items = [];
        for (let i = 0; i < 10; i++) {
            if (i < selectedItems.length) {
                items.push({ id: selectedItems[i].id, count: String(selectedItems[i].count) });
            } else {
                items.push({ id: "", count: "" });
            }
        }

        const config = {
            serverValue: serverValue || "0",
            roleId: roleId || "",
            items: items,
            subject: "1",
            content: "1"
        };

        const script = `// 自动填充脚本（先清空后填充）
(function() {
    const config = ${JSON.stringify(config, null, 4)};
    function triggerEvent(el, type) {
        if (!el) return;
        el.dispatchEvent(new Event(type, { bubbles: true, cancelable: true }));
    }
    function clearForm() {
        const select = document.querySelector('#select_server');
        if (select) { select.value = "0"; triggerEvent(select, 'change'); if (typeof $ !== 'undefined' && $(select).data('select2')) $(select).trigger('change'); }
        const roleInput = document.querySelector('#role_id');
        if (roleInput) { roleInput.value = ""; triggerEvent(roleInput, 'input'); triggerEvent(roleInput, 'change'); }
        for (let i = 1; i <= 10; i++) {
            const th = Array.from(document.querySelectorAll('th')).find(el => el.textContent.trim() === \`物品\${i}\`);
            if (th) {
                const row = th.closest('tr');
                const inputs = row.querySelectorAll(\`input[name="item\${i}[]"][type="text"]\`);
                if (inputs.length >= 2) {
                    inputs[0].value = ""; inputs[1].value = "";
                    triggerEvent(inputs[0], 'input'); triggerEvent(inputs[0], 'change');
                    triggerEvent(inputs[1], 'input'); triggerEvent(inputs[1], 'change');
                }
            }
        }
        const subjectInput = document.querySelector('input[name="subject"]');
        if (subjectInput) { subjectInput.value = ""; triggerEvent(subjectInput, 'input'); triggerEvent(subjectInput, 'change'); }
        const contentArea = document.querySelector('textarea[name="content"]');
        if (contentArea) { contentArea.value = ""; triggerEvent(contentArea, 'input'); triggerEvent(contentArea, 'change'); }
        console.log('[清空] 已重置所有表单字段');
    }
    function fillForm() {
        const select = document.querySelector('#select_server');
        if (select) { select.value = config.serverValue; triggerEvent(select, 'change'); if (typeof $ !== 'undefined' && $(select).data('select2')) $(select).trigger('change'); console.log(\`✓ 区服: \${select.options[select.selectedIndex]?.text}\`); }
        const roleInput = document.querySelector('#role_id');
        if (roleInput) { roleInput.value = config.roleId; triggerEvent(roleInput, 'input'); triggerEvent(roleInput, 'change'); console.log(\`✓ 角色ID: \${config.roleId}\`); }
        for (let i = 1; i <= 10; i++) {
            const item = config.items[i-1];
            if (!item || (!item.id && !item.count)) continue;
            const th = Array.from(document.querySelectorAll('th')).find(el => el.textContent.trim() === \`物品\${i}\`);
            if (th) {
                const row = th.closest('tr');
                const inputs = row.querySelectorAll(\`input[name="item\${i}[]"][type="text"]\`);
                if (inputs.length >= 2) {
                    if (item.id) { inputs[0].value = item.id; triggerEvent(inputs[0], 'input'); triggerEvent(inputs[0], 'change'); }
                    if (item.count) { inputs[1].value = item.count; triggerEvent(inputs[1], 'input'); triggerEvent(inputs[1], 'change'); }
                    console.log(\`✓ 物品\${i}: ID=\${inputs[0].value}, 数量=\${inputs[1].value}\`);
                }
            }
        }
        const subjectInput = document.querySelector('input[name="subject"]');
        if (subjectInput) { subjectInput.value = config.subject; triggerEvent(subjectInput, 'input'); triggerEvent(subjectInput, 'change'); console.log(\`✓ 标题: \${config.subject}\`); }
        const contentArea = document.querySelector('textarea[name="content"]');
        if (contentArea) { contentArea.value = config.content; triggerEvent(contentArea, 'input'); triggerEvent(contentArea, 'change'); console.log('✓ 邮件内容已填'); }
        console.log('✅ 填充完成');
    }
    clearForm();
    fillForm();
})();`;

        navigator.clipboard.writeText(script).then(() => {
            showToast('脚本已复制到剪贴板');	
        }).catch(() => {
            showToast('复制失败，请手动复制', true);
        });
    }

    // 事件绑定
    searchInput.addEventListener('input', renderItemList);
    document.getElementById('addSelectedBtn').addEventListener('click', addSelected);
    document.getElementById('clearSearchSelectionBtn').addEventListener('click', clearSearchSelection);
    document.getElementById('clearAllSelectedBtn').addEventListener('click', clearAllSelected);
    document.getElementById('generateBtn').addEventListener('click', generateAndCopy);

    // 初始渲染
    renderItemList();
    renderSelectedList();
</script>
</body>
</html>
