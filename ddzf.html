<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大道争锋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            padding: 24px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border: 1px solid #e2e8f0;
            padding: 20px;
        }
        /* 主标题 */
        h2 {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 24px;
            padding-left: 12px;
            border-left: 3px solid #2c3e50;
            color: #222;
        }
        /* 四列布局 */
        .four-columns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            align-items: start;
        }
        /* 卡片通用样式 - 极简 */
        .card {
            background: #fefefe;
            border: 1px solid #e2e8f0;
            padding: 12px;
        }
        .card-title {
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e2e8f0;
            color: #1e2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* 列表区域 */
        .role-list, .scheme-list {
            max-height: 260px;
            overflow-y: auto;
            margin-bottom: 8px;
        }
        .role-item, .scheme-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            padding: 5px 0;
            border-bottom: 1px solid #edf2f7;
        }
        .role-item span:first-child, .scheme-item span:first-child {
            cursor: pointer;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        /* 按钮样式 - 纯色无圆角 */
        button {
            background: #2c3e50;
            border: none;
            color: white;
            padding: 4px 12px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        button.small {
            background: #64748b;
            padding: 2px 8px;
        }
        button.danger {
            background: #9ca3af;
        }
        button.danger:hover {
            background: #7f8c8d;
        }
        button.primary {
            background: #2c3e50;
        }
        button.clear-btn {
            background: #e2e8f0;
            color: #1e293b;
        }
        /* 基本信息表单 */
        .basic-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .basic-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .basic-row label {
            width: 60px;
            font-size: 0.8rem;
            color: #334155;
        }
        .basic-row input {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid #cbd5e1;
            font-size: 0.8rem;
            background: white;
        }
        /* 道具配置搜索框和列表 */
        .search-input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            font-size: 0.8rem;
            margin-bottom: 8px;
            background: white;
        }
        .item-list {
            border: 1px solid #e2e8f0;
            background: white;
            max-height: 280px;
            overflow-y: auto;
        }
        .item-row {
            padding: 6px 8px;
            cursor: pointer;
            font-size: 0.8rem;
            border-bottom: 1px solid #f0f2f5;
        }
        .item-row:hover {
            background: #f8fafc;
        }
        .item-row.selected {
            background: #e2e8f0;
        }
        /* 生成按钮区域 */
        .generate-wrapper {
            margin-bottom: 16px;
        }
        .generate-wrapper button {
            background: #2c3e50;
            width: 100%;
            padding: 8px;
            font-size: 0.85rem;
        }
        /* 已选道具区域 */
        .selected-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .selected-list {
            border: 1px solid #e2e8f0;
            background: white;
            max-height: 280px;
            overflow-y: auto;
        }
        .selected-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            border-bottom: 1px solid #edf2f7;
            font-size: 0.75rem;
        }
        .selected-item span:first-child {
            flex: 2;
        }
        .selected-item input {
            width: 60px;
            padding: 3px;
            text-align: center;
            border: 1px solid #cbd5e1;
            font-size: 0.75rem;
        }
        .selected-item button {
            background: none;
            border: none;
            color: #c00;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            padding: 0 6px;
        }
        .action-buttons {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .action-buttons button {
            background: #e2e8f0;
            color: #1e293b;
            padding: 4px 12px;
        }
        .action-buttons button.primary {
            background: #2c3e50;
            color: white;
        }
        .placeholder-text {
            color: #94a3b8;
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 6px 12px;
            font-size: 0.8rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        @media (max-width: 1000px) {
            .four-columns {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<div class="container">
    <h2>大道争锋</h2>
    <div class="four-columns">
        <!-- 第一列：常用角色 -->
        <div class="card">
            <div class="card-title">
                常用角色
                <button id="addRoleBtn" class="small">添加</button>
            </div>
            <div id="roleList" class="role-list">
                <div class="placeholder-text">暂无角色</div>
            </div>
        </div>

        <!-- 第二列：基本信息 + 道具配置 -->
        <div class="card">
            <div class="card-title">基本信息</div>
            <div class="basic-form">
                <div class="basic-row">
                    <label>区服</label>
                    <input type="text" id="serverValue" value="" placeholder="区服">
                </div>
                <div class="basic-row">
                    <label>角色ID</label>
                    <input type="text" id="roleId" value="" placeholder="角色ID">
                </div>
            </div>
            <div class="card-title" style="margin-top: 8px;">道具配置</div>
            <div>
                <input type="text" id="searchInput" class="search-input" placeholder="输入道具名称或ID搜索">
                <div id="itemList" class="item-list"></div>
            </div>
        </div>

        <!-- 第三列：常用方案 -->
        <div class="card">
            <div class="card-title">
                常用方案
                <button id="saveSchemeBtn" class="small">保存当前</button>
            </div>
            <div id="schemeList" class="scheme-list">
                <div class="placeholder-text">暂无方案</div>
            </div>
        </div>

        <!-- 第四列：生成按钮 + 已选道具 -->
        <div class="card">
            <div class="generate-wrapper">
                <button id="generateBtn">生成并复制</button>
            </div>
            <div class="card-title" style="margin-top: 8px;">已选道具</div>
            <div class="selected-header">
                <span>已选道具 (<span id="selectedCount">0</span>/10)</span>
                <button id="clearAllSelectedBtn" class="clear-btn">清空全部</button>
            </div>
            <div id="selectedList" class="selected-list">
                <div class="placeholder-text">暂无道具</div>
            </div>
            <div class="action-buttons">
                <button id="addSelectedBtn" class="primary">添加选中</button>
                <button id="clearSearchSelectionBtn">清空选中</button>
            </div>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>

    // ---------- 全局状态 ----------
    let selectedItems = [];
    let selectedItemIds = new Set();

    // DOM 元素
    const searchInput = document.getElementById('searchInput');
    const itemListDiv = document.getElementById('itemList');
    const selectedListDiv = document.getElementById('selectedList');
    const selectedCountSpan = document.getElementById('selectedCount');
    const serverValueInput = document.getElementById('serverValue');
    const roleIdInput = document.getElementById('roleId');
    const toastDiv = document.getElementById('toast');

    function showToast(msg, isError = false) {
        toastDiv.textContent = msg;
        toastDiv.style.backgroundColor = isError ? '#b91c1c' : '#2c3e50';
        toastDiv.style.opacity = '1';
        setTimeout(() => { toastDiv.style.opacity = '0'; }, 2000);
    }

    function updateSelectedCount() {
        selectedCountSpan.textContent = selectedItems.length;
    }

    function renderItemList() {
        const keyword = searchInput.value.trim();
        if (keyword === '') {
            itemListDiv.innerHTML = '';
            return;
        }
        const lowerKw = keyword.toLowerCase();
        const filtered = ITEM_LIBRARY.filter(item =>
            item.name.toLowerCase().includes(lowerKw) || item.id.toLowerCase().includes(lowerKw)
        );
        if (filtered.length === 0) {
            itemListDiv.innerHTML = '<div class="placeholder-text">未找到道具</div>';
            return;
        }
        itemListDiv.innerHTML = '';
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-row' + (selectedItemIds.has(item.id) ? ' selected' : '');
            div.textContent = `${item.name}`;
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                if (selectedItemIds.has(item.id)) selectedItemIds.delete(item.id);
                else selectedItemIds.add(item.id);
                renderItemList();
            });
            itemListDiv.appendChild(div);
        });
    }

    function renderSelectedList() {
        if (selectedItems.length === 0) {
            selectedListDiv.innerHTML = '<div class="placeholder-text">暂无道具</div>';
            updateSelectedCount();
            return;
        }
        selectedListDiv.innerHTML = '';
        selectedItems.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'selected-item';
            div.innerHTML = `
                <span>${item.name} (${item.id})</span>
                <input type="number" class="item-count" data-idx="${idx}" value="${item.count}" min="1" step="1">
                <button class="remove-item" data-idx="${idx}">✕</button>
            `;
            selectedListDiv.appendChild(div);
        });
        document.querySelectorAll('.item-count').forEach(inp => {
            inp.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                const newVal = parseInt(e.target.value) || 1;
                if (selectedItems[idx]) selectedItems[idx].count = newVal;
            });
        });
        document.querySelectorAll('.remove-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                selectedItems.splice(idx, 1);
                renderSelectedList();
                renderItemList();
                updateSelectedCount();
            });
        });
        updateSelectedCount();
    }

    function addSelected() {
        if (selectedItemIds.size === 0) {
            showToast('请先在左侧点击选择道具', true);
            return;
        }
        if (selectedItems.length >= 10) {
            showToast('最多只能选择10个道具，请先删除一些', true);
            return;
        }
        const toAdd = [];
        for (let id of selectedItemIds) {
            const item = ITEM_LIBRARY.find(i => i.id === id);
            if (item) toAdd.push(item);
        }
        let added = 0;
        for (let item of toAdd) {
            if (selectedItems.length >= 10) break;
            selectedItems.push({ id: item.id, name: item.name, count: 1 });
            added++;
        }
        if (added > 0) {
            selectedItemIds.clear();
            renderItemList();
            renderSelectedList();
            showToast(`已添加 ${added} 个道具`);
        } else {
            showToast('未添加任何道具', true);
        }
    }

    function clearSearchSelection() {
        selectedItemIds.clear();
        renderItemList();
        showToast('已清空左侧选中');
    }

    function clearAllSelected() {
        selectedItems = [];
        renderSelectedList();
        showToast('已清空全部道具');
    }

    // ---------- 常用方案 ----------
    const STORAGE_SCHEMES = 'mailTool_schemes';
    function loadSchemes() {
        const raw = localStorage.getItem(STORAGE_SCHEMES);
        if (!raw) return [];
        try { return JSON.parse(raw); } catch(e) { return []; }
    }
    function saveSchemes(schemes) {
        localStorage.setItem(STORAGE_SCHEMES, JSON.stringify(schemes));
        renderSchemeList();
    }
    function renderSchemeList() {
        const container = document.getElementById('schemeList');
        const schemes = loadSchemes();
        if (!schemes.length) {
            container.innerHTML = '<div class="placeholder-text">暂无方案</div>';
            return;
        }
        container.innerHTML = '';
        schemes.forEach((scheme, idx) => {
            const div = document.createElement('div');
            div.className = 'scheme-item';
            div.innerHTML = `
                <span>${escapeHtml(scheme.name)} (${scheme.items.length})</span>
                <div>
                    <button class="load-scheme" data-idx="${idx}" style="background:#3b82f6;">加载</button>
                    <button class="del-scheme" data-idx="${idx}" style="background:#9ca3af;">删</button>
                </div>
            `;
            container.appendChild(div);
        });
        document.querySelectorAll('.load-scheme').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                const schemes = loadSchemes();
                if (schemes[idx]) loadSchemeData(schemes[idx].items);
            });
        });
        document.querySelectorAll('.del-scheme').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                let schemes = loadSchemes();
                schemes.splice(idx, 1);
                saveSchemes(schemes);
                showToast('方案已删除');
            });
        });
    }
    function loadSchemeData(items) {
        if (!items || !items.length) return;
        if (items.length > 10) items = items.slice(0,10);
        const newSelected = [];
        for (let it of items) {
            const libItem = ITEM_LIBRARY.find(i => i.id === it.id);
            if (libItem) {
                newSelected.push({ id: libItem.id, name: libItem.name, count: it.count || 1 });
            } else {
                showToast(`道具ID ${it.id} 不存在，已跳过`, true);
            }
        }
        if (newSelected.length) {
            selectedItems = newSelected;
            renderSelectedList();
            renderItemList();
            showToast(`已加载方案，共 ${newSelected.length} 个道具`);
        } else {
            showToast('方案中无有效道具', true);
        }
    }
    function saveCurrentScheme() {
        if (selectedItems.length === 0) {
            showToast('当前没有道具，无法保存方案', true);
            return;
        }
        const name = prompt('请输入方案名称：', `方案${new Date().toLocaleTimeString()}`);
        if (!name) return;
        const schemes = loadSchemes();
        const itemsToSave = selectedItems.map(item => ({ id: item.id, count: item.count }));
        schemes.push({ name: name, items: itemsToSave });
        saveSchemes(schemes);
        showToast('方案已保存');
    }

    // ---------- 常用角色 ----------
    const STORAGE_ROLES = 'mailTool_roles';
    function loadRoles() {
        const raw = localStorage.getItem(STORAGE_ROLES);
        if (!raw) return [];
        try { return JSON.parse(raw); } catch(e) { return []; }
    }
    function saveRoles(roles) {
        localStorage.setItem(STORAGE_ROLES, JSON.stringify(roles));
        renderRoleList();
    }
    function renderRoleList() {
        const container = document.getElementById('roleList');
        const roles = loadRoles();
        if (!roles.length) {
            container.innerHTML = '<div class="placeholder-text">暂无角色</div>';
            return;
        }
        container.innerHTML = '';
        roles.forEach((role, idx) => {
            const div = document.createElement('div');
            div.className = 'role-item';
            div.innerHTML = `
                <span>${escapeHtml(role.serverValue)} - ${escapeHtml(role.roleId)}</span>
                <div>
                    <button class="edit-role" data-idx="${idx}" style="background:#3b82f6;">编辑</button>
                    <button class="del-role" data-idx="${idx}" style="background:#9ca3af;">删</button>
                </div>
            `;
            container.appendChild(div);
        });
        document.querySelectorAll('.edit-role').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                editRole(idx);
            });
        });
        document.querySelectorAll('.del-role').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                let roles = loadRoles();
                roles.splice(idx, 1);
                saveRoles(roles);
                showToast('角色已删除');
            });
        });
        container.querySelectorAll('.role-item span').forEach(span => {
            span.addEventListener('click', (e) => {
                const idx = parseInt(span.closest('.role-item').querySelector('.edit-role').dataset.idx);
                const roles = loadRoles();
                if (roles[idx]) {
                    serverValueInput.value = roles[idx].serverValue;
                    roleIdInput.value = roles[idx].roleId;
                    showToast('已填充角色信息');
                }
            });
        });
    }
    function addRole() {
        const serverValue = prompt('区服:', '');
        if (serverValue === null) return;
        const roleId = prompt('角色ID:', '');
        if (roleId === null) return;
        const roles = loadRoles();
        roles.push({ serverValue: serverValue.trim(), roleId: roleId.trim() });
        saveRoles(roles);
        showToast('角色已添加');
    }
    function editRole(idx) {
        const roles = loadRoles();
        const role = roles[idx];
        if (!role) return;
        const newServer = prompt('编辑区服 value:', role.serverValue);
        if (newServer === null) return;
        const newRoleId = prompt('编辑角色ID:', role.roleId);
        if (newRoleId === null) return;
        role.serverValue = newServer.trim();
        role.roleId = newRoleId.trim();
        saveRoles(roles);
        showToast('角色已更新');
    }

    // ---------- 生成脚本 ----------
    function generateAndCopy() {
        const serverValue = serverValueInput.value.trim();
        const roleId = roleIdInput.value.trim();
        const items = [];
        for (let i = 0; i < 10; i++) {
            if (i < selectedItems.length) {
                items.push({ id: selectedItems[i].id, count: String(selectedItems[i].count) });
            } else {
                items.push({ id: "", count: "" });
            }
        }
        const config = { serverValue: serverValue || "0", roleId: roleId || "", items, subject: "1", content: "1" };
        const script = `// 自动填充脚本（先清空后填充）
(function() {
    const config = ${JSON.stringify(config, null, 4)};
    function triggerEvent(el, type) {
        if (!el) return;
        el.dispatchEvent(new Event(type, { bubbles: true, cancelable: true }));
    }
    function clearForm() {
        const select = document.querySelector('#select_server');
        if (select) { select.value = "0"; triggerEvent(select, 'change'); if (typeof $ !== 'undefined' && $(select).data('select2')) $(select).trigger('change'); }
        const roleInput = document.querySelector('#role_id');
        if (roleInput) { roleInput.value = ""; triggerEvent(roleInput, 'input'); triggerEvent(roleInput, 'change'); }
        for (let i = 1; i <= 10; i++) {
            const th = Array.from(document.querySelectorAll('th')).find(el => el.textContent.trim() === \`物品\${i}\`);
            if (th) {
                const row = th.closest('tr');
                const inputs = row.querySelectorAll(\`input[name="item\${i}[]"][type="text"]\`);
                if (inputs.length >= 2) {
                    inputs[0].value = ""; inputs[1].value = "";
                    triggerEvent(inputs[0], 'input'); triggerEvent(inputs[0], 'change');
                    triggerEvent(inputs[1], 'input'); triggerEvent(inputs[1], 'change');
                }
            }
        }
        const subjectInput = document.querySelector('input[name="subject"]');
        if (subjectInput) { subjectInput.value = ""; triggerEvent(subjectInput, 'input'); triggerEvent(subjectInput, 'change'); }
        const contentArea = document.querySelector('textarea[name="content"]');
        if (contentArea) { contentArea.value = ""; triggerEvent(contentArea, 'input'); triggerEvent(contentArea, 'change'); }
        console.log('[清空] 已重置所有表单字段');
    }
    function fillForm() {
        const select = document.querySelector('#select_server');
        if (select) { select.value = config.serverValue; triggerEvent(select, 'change'); if (typeof $ !== 'undefined' && $(select).data('select2')) $(select).trigger('change'); console.log(\`✓ 区服: \${select.options[select.selectedIndex]?.text}\`); }
        const roleInput = document.querySelector('#role_id');
        if (roleInput) { roleInput.value = config.roleId; triggerEvent(roleInput, 'input'); triggerEvent(roleInput, 'change'); console.log(\`✓ 角色ID: \${config.roleId}\`); }
        for (let i = 1; i <= 10; i++) {
            const item = config.items[i-1];
            if (!item || (!item.id && !item.count)) continue;
            const th = Array.from(document.querySelectorAll('th')).find(el => el.textContent.trim() === \`物品\${i}\`);
            if (th) {
                const row = th.closest('tr');
                const inputs = row.querySelectorAll(\`input[name="item\${i}[]"][type="text"]\`);
                if (inputs.length >= 2) {
                    if (item.id) { inputs[0].value = item.id; triggerEvent(inputs[0], 'input'); triggerEvent(inputs[0], 'change'); }
                    if (item.count) { inputs[1].value = item.count; triggerEvent(inputs[1], 'input'); triggerEvent(inputs[1], 'change'); }
                    console.log(\`✓ 物品\${i}: ID=\${inputs[0].value}, 数量=\${inputs[1].value}\`);
                }
            }
        }
        const subjectInput = document.querySelector('input[name="subject"]');
        if (subjectInput) { subjectInput.value = config.subject; triggerEvent(subjectInput, 'input'); triggerEvent(subjectInput, 'change'); console.log(\`✓ 标题: \${config.subject}\`); }
        const contentArea = document.querySelector('textarea[name="content"]');
        if (contentArea) { contentArea.value = config.content; triggerEvent(contentArea, 'input'); triggerEvent(contentArea, 'change'); console.log('✓ 邮件内容已填'); }
        console.log('✅ 填充完成');
    }
    clearForm();
    fillForm();
})();`;
        navigator.clipboard.writeText(script).then(() => {
            showToast('已复制到剪贴板');
        }).catch(() => {
            showToast('复制失败，请手动复制', true);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 绑定事件
    searchInput.addEventListener('input', renderItemList);
    document.getElementById('addSelectedBtn').addEventListener('click', addSelected);
    document.getElementById('clearSearchSelectionBtn').addEventListener('click', clearSearchSelection);
    document.getElementById('clearAllSelectedBtn').addEventListener('click', clearAllSelected);
    document.getElementById('generateBtn').addEventListener('click', generateAndCopy);
    document.getElementById('saveSchemeBtn').addEventListener('click', saveCurrentScheme);
    document.getElementById('addRoleBtn').addEventListener('click', addRole);

    // 初始化
    renderItemList();
    renderSelectedList();
    renderSchemeList();
    renderRoleList();
</script>
