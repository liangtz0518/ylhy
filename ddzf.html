<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大道争锋</title>
    <style>
        :root {
            --bg-body: #f5f5f7;
            --bg-card: #ffffff;
            --bg-hover: #f5f5f7;
            --bg-input: #f5f5f7;
            --border: #e5e5e7;
            --border-focus: #0071e3;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-muted: #aeaeb2;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --accent-light: rgba(0, 113, 227, 0.08);
            --danger: #ff3b30;
            --danger-hover: #e0352b;
            --danger-light: rgba(255, 59, 48, 0.06);
            --success: #34c759;
            --info: #0071e3;
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 20px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
            --shadow: 0 4px 16px rgba(0,0,0,0.04), 0 1px 4px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.08);
            --transition: 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-slow: 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 32px;
            line-height: 1.47059;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== SCROLLBAR (Apple style) ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.15);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

        /* ===== HEADER ===== */
        .header {
            max-width: 1440px;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header-icon {
            width: 52px; height: 52px;
            background: var(--text-primary);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            color: #fff;
            box-shadow: var(--shadow-sm);
        }
        .header-text h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.015em;
            color: var(--text-primary);
            line-height: 1.2;
        }
        .header-text .subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            letter-spacing: -0.01em;
            margin-top: 2px;
        }

        /* ===== MAIN LAYOUT ===== */
        .main-layout {
            max-width: 1440px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 260px 1fr 340px;
            gap: 24px;
            align-items: start;
        }

        /* ===== CARD (Apple style) ===== */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
        }
        .card-header .label {
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text-secondary);
            text-transform: none;
        }
        .card-body {
            padding: 20px 24px;
        }
        .card-body.no-pad { padding: 0; }

        /* ===== BUTTONS (Apple pill style) ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 7px 16px;
            border: none;
            border-radius: 980px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--bg-input);
            color: var(--text-primary);
            white-space: nowrap;
            font-family: inherit;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }
        .btn:hover {
            background: #e8e8ed;
        }
        .btn:active {
            transform: scale(0.97);
            background: #e0e0e5;
        }
        .btn-primary {
            background: var(--accent);
            color: #ffffff;
            font-weight: 500;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 2px 8px rgba(0, 113, 227, 0.3);
        }
        .btn-primary:active {
            background: #0060c0;
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
        }
        .btn-danger:hover {
            background: var(--danger-light);
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 0.6875rem;
            border-radius: 980px;
        }
        .btn-block { width: 100%; justify-content: center; }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 0;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: all var(--transition);
            font-family: inherit;
            letter-spacing: -0.01em;
            -webkit-appearance: none;
        }
        .form-group input:hover {
            background: #ebebf0;
        }
        .form-group input:focus {
            outline: none;
            background: #ffffff;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }
        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .search-box {
            position: relative;
        }
        .search-box .search-icon {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.875rem;
            pointer-events: none;
        }
        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: var(--bg-input);
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: all var(--transition);
            font-family: inherit;
            letter-spacing: -0.01em;
        }
        .search-box input:hover {
            background: #ebebf0;
        }
        .search-box input:focus {
            outline: none;
            background: #ffffff;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }
        .search-box input::placeholder {
            color: var(--text-muted);
        }

        /* ===== LIST (roles / schemes) ===== */
        .list-container {
            max-height: 220px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            font-size: 0.8125rem;
            transition: background var(--transition);
        }
        .list-item:hover {
            background: var(--bg-hover);
        }
        .list-item .item-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            color: var(--text-primary);
            transition: color var(--transition);
            letter-spacing: -0.01em;
        }
        .list-item .item-label:hover {
            color: var(--accent);
        }
        .list-item .item-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            margin-left: 12px;
        }

        .placeholder-text {
            color: var(--text-muted);
            text-align: center;
            padding: 32px 20px;
            font-size: 0.8125rem;
            letter-spacing: -0.01em;
        }

        /* ===== ITEM LIBRARY (search results) ===== */
        .item-library {
            max-height: 300px;
            overflow-y: auto;
        }
        .item-library .item-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 24px;
            cursor: pointer;
            font-size: 0.8125rem;
            transition: all var(--transition);
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }
        .item-library .item-option:hover {
            background: var(--bg-hover);
        }
        .item-library .item-option.selected {
            background: var(--accent-light);
            color: var(--accent);
        }
        .item-library .item-option .check-circle {
            width: 20px; height: 20px;
            border-radius: 50%;
            border: 2px solid #d2d2d7;
            flex-shrink: 0;
            transition: all var(--transition);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }
        .item-library .item-option:hover .check-circle {
            border-color: #b0b0b8;
        }
        .item-library .item-option.selected .check-circle {
            border-color: var(--accent);
            background: var(--accent);
            color: #ffffff;
        }
        .item-search-actions {
            display: flex;
            gap: 10px;
            padding: 16px 24px 20px;
        }

        /* ===== SELECTED ITEMS ===== */
        .selected-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }
        .selected-count {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: -0.01em;
        }
        .selected-count strong {
            color: var(--accent);
            font-weight: 600;
        }
        .selected-items-list {
            max-height: 320px;
            overflow-y: auto;
        }
        .selected-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 24px;
            font-size: 0.8125rem;
            transition: background var(--transition);
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        .selected-row:last-child { border-bottom: none; }
        .selected-row:hover { background: var(--bg-hover); }
        .selected-row .item-info {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }
        .selected-row .item-info .item-id {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-left: 6px;
            font-weight: 400;
        }
        .selected-row input[type="number"] {
            width: 60px;
            padding: 6px 8px;
            background: var(--bg-input);
            border: 1px solid transparent;
            border-radius: 6px;
            color: var(--text-primary);
            text-align: center;
            font-size: 0.8125rem;
            transition: all var(--transition);
            font-family: inherit;
            -webkit-appearance: none;
        }
        .selected-row input[type="number"]:hover {
            background: #ebebf0;
        }
        .selected-row input[type="number"]:focus {
            outline: none;
            background: #ffffff;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }
        .selected-row .remove-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 6px;
            border-radius: 50%;
            transition: all var(--transition);
            line-height: 1;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .selected-row .remove-btn:hover {
            color: var(--danger);
            background: var(--danger-light);
        }

        /* ===== GENERATE SECTION ===== */
        .generate-section {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .generate-section .btn-generate {
            width: 100%;
            padding: 14px;
            font-size: 0.9375rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            background: var(--accent);
            border: none;
            border-radius: 980px;
            color: #ffffff;
            cursor: pointer;
            transition: all var(--transition-slow);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        .generate-section .btn-generate:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(0, 113, 227, 0.3);
            transform: translateY(-1px);
        }
        .generate-section .btn-generate:active {
            transform: scale(0.98);
            background: #0060c0;
        }
        .selected-footer {
            display: flex;
            gap: 8px;
            padding: 14px 24px;
        }

        /* ===== TOAST (Apple frosted glass style) ===== */
        .toast {
            position: fixed;
            top: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(-12px);
            background: rgba(29, 29, 31, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #ffffff;
            padding: 10px 28px;
            border-radius: 980px;
            font-size: 0.8125rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            z-index: 1000;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
            pointer-events: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.error {
            background: rgba(255, 59, 48, 0.92);
        }
        .toast.success {
            background: rgba(29, 29, 31, 0.9);
        }

        /* ===== LIST BUTTONS (load/edit/delete) ===== */
        .list-actions { display: flex; gap: 4px; }
        .list-actions .btn-load {
            color: var(--accent);
            background: transparent;
        }
        .list-actions .btn-load:hover {
            background: var(--accent-light);
        }
        .list-actions .btn-del {
            color: var(--text-muted);
            background: transparent;
        }
        .list-actions .btn-del:hover {
            color: var(--danger);
            background: var(--danger-light);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 1fr 1fr;
            }
            .sidebar-left {
                grid-column: 1 / -1;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 24px;
            }
        }
        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
            .sidebar-left { grid-template-columns: 1fr; }
            body { padding: 16px; }
            .header { margin-bottom: 28px; }
            .header-text h1 { font-size: 1.5rem; }
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            animation: fadeUp 0.45s cubic-bezier(0.25, 0.1, 0.25, 1) both;
        }
        .card:nth-child(2) { animation-delay: 0.06s; }
        .card:nth-child(3) { animation-delay: 0.12s; }
        .card:nth-child(4) { animation-delay: 0.18s; }
    </style>
</head>

                <div id="itemList" class="item-library"></div>

                    <button id="addSelectedBtn" class="btn btn-primary" style="flex:1;">添加选中</button>
                    <button id="clearSearchSelectionBtn" class="btn">清空选中</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== RIGHT: GENERATE + SELECTED ITEMS ===== -->
    <div style="display:flex;flex-direction:column;">
        <div class="card">
            <!-- Generate Button -->
            <div class="generate-section">
                <button id="generateBtn" class="btn-generate">生成并复制脚本</button>
            </div>

            <!-- Selected Items Header -->
            <div class="selected-header-row">
                <span class="label" style="font-weight:600;color:var(--text-primary);">已选道具</span>
                <span class="selected-count">已选 <strong id="selectedCount">0</strong> / 10</span>
            </div>

            <!-- Selected Items List -->
            <div id="selectedList" class="selected-items-list">
                <div class="placeholder-text">暂无道具</div>
            </div>

            <!-- Footer Actions -->
            <div class="selected-footer">
                <button id="clearAllSelectedBtn" class="btn btn-danger btn-sm" style="margin-left:auto;">全部清空</button>
            </div>
        </div>
    </div>
</div>

    // ===== GLOBAL STATE =====
    let selectedItems = [];
    let selectedItemIds = new Set();

    // ===== DOM REFS =====
    const searchInput = document.getElementById('searchInput');
    const itemListDiv = document.getElementById('itemList');
    const selectedListDiv = document.getElementById('selectedList');
    const selectedCountSpan = document.getElementById('selectedCount');
    const serverValueInput = document.getElementById('serverValue');
    const roleIdInput = document.getElementById('roleId');
    const toastDiv = document.getElementById('toast');

    // ===== TOAST =====
    let toastTimer;
    function showToast(msg, isError = false) {
        clearTimeout(toastTimer);
        toastDiv.textContent = msg;
        toastDiv.className = 'toast ' + (isError ? 'error' : 'success');
        requestAnimationFrame(() => { toastDiv.classList.add('show'); });
        toastTimer = setTimeout(() => { toastDiv.classList.remove('show'); }, 2200);
    }

    function updateSelectedCount() {
        selectedCountSpan.textContent = selectedItems.length;
    }

    // ===== ITEM SEARCH =====
    function renderItemList() {
        const keyword = searchInput.value.trim();
        if (keyword === '') {
            itemListDiv.innerHTML = '';
            return;
        }
        const lowerKw = keyword.toLowerCase();
        const filtered = ITEM_LIBRARY.filter(item =>
            item.name.toLowerCase().includes(lowerKw) || item.id.toLowerCase().includes(lowerKw)
        );
        if (filtered.length === 0) {
            itemListDiv.innerHTML = '<div class="placeholder-text">未找到道具</div>';
            return;
        }
        itemListDiv.innerHTML = '';
        filtered.forEach(item => {
            const div = document.createElement('div');
            const isSel = selectedItemIds.has(item.id);
            div.className = 'item-option' + (isSel ? ' selected' : '');
            div.innerHTML = `
                <span class="check-circle">${isSel ? '✓' : ''}</span>
                <span style="flex:1;">${escapeHtml(item.name)}</span>
                <span style="color:var(--text-muted);font-size:0.75rem;">#${item.id}</span>
            `;
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                if (selectedItemIds.has(item.id)) {
                    selectedItemIds.delete(item.id);
                } else {
                    if (selectedItemIds.size + selectedItems.length >= 10) {
                        showToast('已经10個啦，衰仔', true);
                        return;
                    }
                    selectedItemIds.add(item.id);
                }
                renderItemList();
            });
            itemListDiv.appendChild(div);
        });
    }

    // ===== SELECTED ITEMS =====
    function renderSelectedList() {
        if (selectedItems.length === 0) {
            selectedListDiv.innerHTML = '<div class="placeholder-text">暂无道具</div>';
            updateSelectedCount();
            return;
        }
        selectedListDiv.innerHTML = '';
        selectedItems.forEach((item, idx) => {
            const row = document.createElement('div');
            row.className = 'selected-row';
            row.innerHTML = `
                <span class="item-info">${escapeHtml(item.name)}<span class="item-id">#${item.id}</span></span>
                <input type="number" class="item-count" data-idx="${idx}" value="${item.count}" min="1" step="1">
                <button class="remove-btn" data-idx="${idx}" title="移除">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            `;
            selectedListDiv.appendChild(row);
        });
        selectedListDiv.querySelectorAll('.item-count').forEach(inp => {
            inp.addEventListener('change', function() {
                const idx = parseInt(this.dataset.idx);
                const val = parseInt(this.value) || 1;
                if (selectedItems[idx]) selectedItems[idx].count = Math.max(1, val);
                this.value = selectedItems[idx].count;
            });
        });
        selectedListDiv.querySelectorAll('.remove-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const idx = parseInt(this.dataset.idx);
                selectedItems.splice(idx, 1);
                renderSelectedList();
                renderItemList();
            });
        });
        updateSelectedCount();
    }

    // ===== ADD / CLEAR SELECTIONS =====
    function addSelected() {
        if (selectedItemIds.size === 0) { showToast('咩都冇选，加咩加啊', true); return; }
        if (selectedItems.length >= 10) { showToast('最多只能选择 10 个道具', true); return; }
        const maxSlots = 10 - selectedItems.length;
        const toAdd = [];
        let count = 0;
        for (let id of selectedItemIds) {
            if (count >= maxSlots) break;
            const item = ITEM_LIBRARY.find(i => i.id === id);
            if (item) { toAdd.push(item); count++; }
        }
        let added = 0;
        for (let item of toAdd) {
            if (selectedItems.length >= 10) break;
            selectedItems.push({ id: item.id, name: item.name, count: 1 });
            added++;
        }
        if (added > 0) {
            selectedItemIds.clear();
            renderItemList();
            renderSelectedList();
            showToast(`已添加 ${added} 个道具`);
        } else {
            showToast('未添加任何道具', true);
        }
    }

    function clearSearchSelection() {
        selectedItemIds.clear();
        renderItemList();
        showToast('已清空搜索选中');
    }

    function clearAllSelected() {
        serverValueInput.value = '';
        roleIdInput.value = '';
        selectedItemIds.clear();
        selectedItems = [];
        renderItemList();
        renderSelectedList();
        showToast('已清空全部配置信息');
    }

    // ===== SCHEMES =====
    const STORAGE_SCHEMES = 'mailTool_schemes';
    function loadSchemes() {
        try { return JSON.parse(localStorage.getItem(STORAGE_SCHEMES)) || []; } catch(e) { return []; }
    }
    function saveSchemes(schemes) {
        localStorage.setItem(STORAGE_SCHEMES, JSON.stringify(schemes));
        renderSchemeList();
    }
    function renderSchemeList() {
        const container = document.getElementById('schemeList');
        const schemes = loadSchemes();
        if (!schemes.length) {
            container.innerHTML = '<div class="placeholder-text">暂无方案</div>';
            return;
        }
        container.innerHTML = '';
        schemes.forEach((scheme, idx) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <span class="item-label" title="${escapeHtml(scheme.name)}">${escapeHtml(scheme.name)} <span style="color:var(--text-muted);font-size:0.7rem;">(${scheme.items.length})</span></span>
                <div class="list-actions">
                    <button class="btn btn-sm btn-load" data-idx="${idx}">加载</button>
                    <button class="btn btn-sm btn-del" data-idx="${idx}">删除</button>
                </div>
            `;
            container.appendChild(div);
        });
        container.querySelectorAll('.btn-load').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.idx);
                loadSchemeData(loadSchemes()[idx].items);
            });
        });
        container.querySelectorAll('.btn-del').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.idx);
                let schemes = loadSchemes();
                schemes.splice(idx, 1);
                saveSchemes(schemes);
                showToast('方案已删除');
            });
        });
    }
    function loadSchemeData(items) {
        if (!items || !items.length) return;
        if (items.length > 10) items = items.slice(0, 10);
        const newSelected = [];
        for (let it of items) {
            const libItem = ITEM_LIBRARY.find(i => i.id === it.id);
            if (libItem) newSelected.push({ id: libItem.id, name: libItem.name, count: it.count || 1 });
            else showToast(`道具 ${it.id} 在库中不存在`, true);
        }
        if (newSelected.length) {
            selectedItems = newSelected;
            renderSelectedList();
            renderItemList();
            showToast(`已加载方案（${newSelected.length} 个道具）`);
        } else {
            showToast('方案中无有效道具', true);
        }
    }
    function saveCurrentScheme() {
        if (selectedItems.length === 0) { showToast('当前没有道具，无法保存', true); return; }
        const name = prompt('方案名称：', `方案 ${new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'})}`);
        if (!name || !name.trim()) return;
        const schemes = loadSchemes();
        schemes.push({ name: name.trim(), items: selectedItems.map(i => ({id:i.id, count:i.count})) });
        saveSchemes(schemes);
        showToast('方案已保存');
    }

    // ===== ROLES =====
    const STORAGE_ROLES = 'mailTool_roles';
    function loadRoles() {
        try { return JSON.parse(localStorage.getItem(STORAGE_ROLES)) || []; } catch(e) { return []; }
    }
    function saveRoles(roles) {
        localStorage.setItem(STORAGE_ROLES, JSON.stringify(roles));
        renderRoleList();
    }
    function renderRoleList() {
        const container = document.getElementById('roleList');
        const roles = loadRoles();
        if (!roles.length) {
            container.innerHTML = '<div class="placeholder-text">暂无角色</div>';
            return;
        }
        container.innerHTML = '';
        roles.forEach((role, idx) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <span class="item-label" title="点击填充基本信息">${escapeHtml(role.serverValue)} · ${escapeHtml(role.roleId)}</span>
                <div class="list-actions">
                    <button class="btn btn-sm btn-load" data-idx="${idx}">编辑</button>
                    <button class="btn btn-sm btn-del" data-idx="${idx}">删除</button>
                </div>
            `;
            container.appendChild(div);
        });
        container.querySelectorAll('.item-label').forEach(span => {
            span.addEventListener('click', () => {
                const idx = parseInt(span.parentElement.querySelector('.btn-load').dataset.idx);
                const roles = loadRoles();
                if (roles[idx]) {
                    serverValueInput.value = roles[idx].serverValue;
                    roleIdInput.value = roles[idx].roleId;
                    showToast('已填充角色信息');
                }
            });
        });
        container.querySelectorAll('.btn-load').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.idx);
                editRole(idx);
            });
        });
        container.querySelectorAll('.btn-del').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.idx);
                let roles = loadRoles();
                roles.splice(idx, 1);
                saveRoles(roles);
                showToast('角色已删除');
            });
        });
    }
    function addRole() {
        const server = prompt('区服：', '');
        if (server === null) return;
        const roleId = prompt('角色 ID：', '');
        if (roleId === null) return;
        const roles = loadRoles();
        roles.push({ serverValue: server.trim(), roleId: roleId.trim() });
        saveRoles(roles);
        showToast('角色已添加');
    }
    function editRole(idx) {
        const roles = loadRoles();
        const role = roles[idx];
        if (!role) return;
        const server = prompt('编辑区服：', role.serverValue);
        if (server === null) return;
        const roleId = prompt('编辑角色 ID：', role.roleId);
        if (roleId === null) return;
        role.serverValue = server.trim();
        role.roleId = roleId.trim();
        saveRoles(roles);
        showToast('角色已更新');
    }

    // ===== GENERATE =====
    function generateAndCopy() {
        const serverValue = serverValueInput.value.trim();
        const roleId = roleIdInput.value.trim();
        const items = [];
        for (let i = 0; i < 10; i++) {
            if (i < selectedItems.length) {
                items.push({ id: selectedItems[i].id, count: String(selectedItems[i].count) });
            } else {
                items.push({ id: "", count: "" });
            }
        }
        const config = { serverValue: serverValue || "0", roleId: roleId || "", items, subject: "1", content: "1" };
        const script = `// 自动填充脚本（先清空后填充）
(function() {
    const config = ${JSON.stringify(config, null, 4)};
    function triggerEvent(el, type) {
        if (!el) return;
        el.dispatchEvent(new Event(type, { bubbles: true, cancelable: true }));
    }
    function clearForm() {
        const select = document.querySelector('#select_server');
        if (select) { select.value = "0"; triggerEvent(select, 'change'); if (typeof $ !== 'undefined' && $(select).data('select2')) $(select).trigger('change'); }
        const roleInput = document.querySelector('#role_id');
        if (roleInput) { roleInput.value = ""; triggerEvent(roleInput, 'input'); triggerEvent(roleInput, 'change'); }
        for (let i = 1; i <= 10; i++) {
            const th = Array.from(document.querySelectorAll('th')).find(el => el.textContent.trim() === \`物品\${i}\`);
            if (th) {
                const row = th.closest('tr');
                const inputs = row.querySelectorAll(\`input[name="item\${i}[]"][type="text"]\`);
                if (inputs.length >= 2) {
                    inputs[0].value = ""; inputs[1].value = "";
                    triggerEvent(inputs[0], 'input'); triggerEvent(inputs[0], 'change');
                    triggerEvent(inputs[1], 'input'); triggerEvent(inputs[1], 'change');
                }
            }
        }
        const subjectInput = document.querySelector('input[name="subject"]');
        if (subjectInput) { subjectInput.value = ""; triggerEvent(subjectInput, 'input'); triggerEvent(subjectInput, 'change'); }
        const contentArea = document.querySelector('textarea[name="content"]');
        if (contentArea) { contentArea.value = ""; triggerEvent(contentArea, 'input'); triggerEvent(contentArea, 'change'); }
        console.log('[清空] 已重置所有表单字段');
    }
    function fillForm() {
        const select = document.querySelector('#select_server');
        if (select) { select.value = config.serverValue; triggerEvent(select, 'change'); if (typeof $ !== 'undefined' && $(select).data('select2')) $(select).trigger('change'); console.log(\`✓ 区服: \${select.options[select.selectedIndex]?.text}\`); }
        const roleInput = document.querySelector('#role_id');
        if (roleInput) { roleInput.value = config.roleId; triggerEvent(roleInput, 'input'); triggerEvent(roleInput, 'change'); console.log(\`✓ 角色ID: \${config.roleId}\`); }
        for (let i = 1; i <= 10; i++) {
            const item = config.items[i-1];
            if (!item || (!item.id && !item.count)) continue;
            const th = Array.from(document.querySelectorAll('th')).find(el => el.textContent.trim() === \`物品\${i}\`);
            if (th) {
                const row = th.closest('tr');
                const inputs = row.querySelectorAll(\`input[name="item\${i}[]"][type="text"]\`);
                if (inputs.length >= 2) {
                    if (item.id) { inputs[0].value = item.id; triggerEvent(inputs[0], 'input'); triggerEvent(inputs[0], 'change'); }
                    if (item.count) { inputs[1].value = item.count; triggerEvent(inputs[1], 'input'); triggerEvent(inputs[1], 'change'); }
                    console.log(\`✓ 物品\${i}: ID=\${inputs[0].value}, 数量=\${inputs[1].value}\`);
                }
            }
        }
        const subjectInput = document.querySelector('input[name="subject"]');
        if (subjectInput) { subjectInput.value = config.subject; triggerEvent(subjectInput, 'input'); triggerEvent(subjectInput, 'change'); console.log(\`✓ 标题: \${config.subject}\`); }
        const contentArea = document.querySelector('textarea[name="content"]');
        if (contentArea) { contentArea.value = config.content; triggerEvent(contentArea, 'input'); triggerEvent(contentArea, 'change'); console.log('✓ 邮件内容已填'); }
        console.log('✅ 填充完成');
    }
    clearForm();
    fillForm();
})();`;
        navigator.clipboard.writeText(script).then(() => {
            showToast('已复制到剪贴板');
        }).catch(() => {
            showToast('复制失败，请手动复制', true);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }

    // ===== BIND EVENTS =====
    searchInput.addEventListener('input', renderItemList);
    document.getElementById('addSelectedBtn').addEventListener('click', addSelected);
    document.getElementById('clearSearchSelectionBtn').addEventListener('click', clearSearchSelection);
    document.getElementById('clearAllSelectedBtn').addEventListener('click', clearAllSelected);
    document.getElementById('generateBtn').addEventListener('click', generateAndCopy);
    document.getElementById('saveSchemeBtn').addEventListener('click', saveCurrentScheme);
    document.getElementById('addRoleBtn').addEventListener('click', addRole);

    // ===== INIT =====
    renderItemList();
    renderSelectedList();
    renderSchemeList();
    renderRoleList();
</script>
</body>
</html>
