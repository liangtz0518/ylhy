<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>逍遥蜀山 · 道具筛查</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f5f7;
      color: #1d1c1f;
      padding: 40px 24px;
      line-height: 1.4;
    }

    .tool-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* 两栏布局：左侧更宽，右侧较窄 */
    .two-columns {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .left-column {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .right-column {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .page-header {
      margin-bottom: 32px;
      text-align: center;
    }

    .page-header h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1d1c1f 0%, #3a3a3e 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }

    .page-header p {
      font-size: 1rem;
      color: #6e6e73;
      font-weight: 400;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 28px 32px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
      border: 1px solid #e9e9ef;
    }

    .section-title {
      font-size: 1.35rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #1d1c1f;
      letter-spacing: -0.01em;
      padding-bottom: 8px;
      border-bottom: 1px solid #e9e9ef;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 20px;
      row-gap: 18px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-group label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .filter-group input {
      font-size: 1rem;
      padding: 10px 14px;
      border: 1px solid #d2d2d7;
      border-radius: 12px;
      background: #ffffff;
      width: 160px;
      outline: none;
      font-weight: 400;
      color: #1d1c1f;
      transition: all 0.2s ease;
    }

    .filter-group input:focus {
      border-color: #007aff;
      box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
    }

    .btn {
      background: #007aff;
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-secondary {
      background: #e8e8ed;
      color: #1d1c1f;
    }

    .btn-secondary:hover {
      background: #d9d9e0;
    }

    .btn:hover {
      background: #005fc1;
      transform: scale(0.98);
    }

    .btn-clear {
      background: #f5f5f7;
      color: #1d1c1f;
      border: 1px solid #d2d2d7;
    }

    .btn-clear:hover {
      background: #e8e8ed;
    }

    .button-group {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .budget-panel {
      background: #f9f9fb;
      border-radius: 18px;
      padding: 14px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      border: 1px solid #e9e9ef;
    }

    .remaining-text {
      font-weight: 500;
      font-size: 1rem;
      color: #1d1c1f;
    }

    .remaining-value {
      font-weight: 700;
      font-size: 1.4rem;
      color: #ff3b30;
      margin-left: 8px;
    }

    .warning-budget {
      color: #ff3b30;
      background: #fff1f0;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
    }

    /* 可选道具区域滚动优化 */
    .items-scroll-area {
      max-height: 520px;
      overflow-y: auto;
      padding-right: 6px;
    }
    .items-scroll-area::-webkit-scrollbar {
      width: 6px;
    }
    .items-scroll-area::-webkit-scrollbar-track {
      background: #e9e9ef;
      border-radius: 10px;
    }
    .items-scroll-area::-webkit-scrollbar-thumb {
      background: #c6c6c8;
      border-radius: 10px;
    }

    .category-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 20px 0 12px 0;
      color: #1d1c1f;
      letter-spacing: -0.2px;
    }

    .item-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 12px;
    }

    .item {
      background: #f9f9fb;
      border: 1px solid #e9e9ef;
      border-radius: 40px;
      padding: 8px 20px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
      font-size: 0.9rem;
      font-weight: 500;
      color: #1d1c1f;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .item:hover {
      background: #007aff;
      border-color: #007aff;
      color: white;
      transform: translateY(-1px);
    }

    .price {
      font-weight: 600;
      color: #ff3b30;
      background: rgba(255, 59, 48, 0.08);
      padding: 2px 10px;
      border-radius: 30px;
      font-size: 0.8rem;
    }

    .item:hover .price {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    .selected-item {
      background: #fff1f0;
      border-color: #ffb3b0;
      color: #c21e1a;
    }

    .selected-item .price {
      background: #ffe2e0;
      color: #c21e1a;
    }

    .selected-item:hover {
      background: #ff3b30;
      border-color: #ff3b30;
      color: white;
    }

    .selected-item:hover .price {
      background: rgba(255, 255, 255, 0.25);
      color: white;
    }

    .empty-message {
      color: #8e8e93;
      text-align: center;
      padding: 40px 20px;
      background: #f9f9fb;
      border-radius: 24px;
      font-size: 0.9rem;
    }

    .selected-list-preview {
      background: #f9f9fb;
      border-radius: 20px;
      padding: 18px 20px;
      border: 1px solid #e9e9ef;
    }

    .selected-category {
      margin-bottom: 16px;
    }

    .selected-category-name {
      font-weight: 600;
      font-size: 1rem;
      color: #1d1c1f;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px dashed #d2d2d7;
    }

    .selected-items-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    .selected-badge {
      background: #ffffff;
      border: 1px solid #e9e9ef;
      border-radius: 30px;
      padding: 6px 16px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #1d1c1f;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .selected-badge:hover {
      background: #ff3b30;
      border-color: #ff3b30;
      color: white;
    }

    .total-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e9e9ef;
    }

    .total-price {
      font-size: 1.8rem;
      font-weight: 700;
      color: #ff3b30;
    }

    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background-color: #1d1c1f;
      color: #ffffff;
      padding: 10px 24px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      z-index: 999;
      backdrop-filter: blur(12px);
      background: rgba(29, 28, 31, 0.92);
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 860px) {
      body {
        padding: 20px 16px;
      }
      .two-columns {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      .card {
        padding: 20px 18px;
      }
      .filter-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .filter-group input {
        width: 100%;
      }
      .page-header h1 {
        font-size: 1.9rem;
      }
      .total-price {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="tool-container">
  <div class="page-header"></div>

  <div class="two-columns">
    <!-- 左侧区域：参数 + 可选道具 -->
    <div class="left-column">
      <div class="card">
        <div class="filter-bar">
          <div class="filter-group">
            <label>开服天数</label>
            <input type="number" id="serverDays" placeholder="天数" value="" step="1">
          </div>
          <div class="filter-group">
            <label>充值金额</label>
            <input type="number" id="rechargeAmount" placeholder="今日充值" value="" step="100">
          </div>
          <div class="filter-group">
            <label>总累充</label>
            <input type="number" id="totalRecharge" placeholder="历史总累充" value="" step="1000">
          </div>
          <div class="filter-group">
            <label>积分</label>
            <input type="number" id="customPrice" placeholder="自动计算" value="" step="100">
          </div>
          <div class="button-group">
            <button class="btn" id="searchBtn">刷新道具</button>
            <button class="btn btn-clear" id="clearSelectedBtn">清空已选</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">可选道具</div>
        <div class="budget-panel" id="budgetPanel">
          <span class="remaining-text">剩余可用积分</span>
          <span class="remaining-value" id="remainingValue">¥0</span>
        </div>
        <div class="items-scroll-area" id="itemsScrollArea">
          <div id="itemsArea"></div>
        </div>
      </div>
    </div>

    <!-- 右侧区域：已选道具 -->
    <div class="right-column">
      <div class="card">
        <div class="section-title">已选道具</div>
        <div id="selectedPreviewArea"></div>
        <div class="total-row">
          <span style="font-weight: 500;">合计积分</span>
          <span class="total-price" id="totalPrice">0</span>
          <button class="btn" id="copyListBtn">复制</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast">复制成功</div>

    const totalRechargeInput = document.getElementById('totalRecharge');

    function getRechargeExtraRate(recharge) {
      const thresholds = [
        { threshold: 1000, rate: 0.5 },
        { threshold: 2000, rate: 1 },
        { threshold: 5000, rate: 1.5 },
        { threshold: 10000, rate: 2 },
        { threshold: 20000, rate: 2.5 },
        { threshold: 30000, rate: 3 },
        { threshold: 50000, rate: 3.5 }
      ];
      let applicableRate = 0;
      for (let i = 0; i < thresholds.length; i++) {
        if (recharge >= thresholds[i].threshold) {
          applicableRate = thresholds[i].rate;
        } else {
          break;
        }
      }
      return applicableRate;
    }

    function getTotalRechargeExtraRate(totalRecharge) {
      const thresholds = [
        { threshold: 2000, rate: 0.4 },
        { threshold: 5000, rate: 0.6 },
        { threshold: 10000, rate: 0.8 },
        { threshold: 20000, rate: 1 },
        { threshold: 30000, rate: 1.2 },
        { threshold: 40000, rate: 1.4 },
        { threshold: 50000, rate: 1.6 },
        { threshold: 70000, rate: 1.8 },
        { threshold: 100000, rate: 2 },
        { threshold: 130000, rate: 2.2 },
        { threshold: 160000, rate: 2.4 },
        { threshold: 190000, rate: 2.6 },
        { threshold: 220000, rate: 2.8 }
      ];
      let applicableRate = 0;
      for (let i = 0; i < thresholds.length; i++) {
        if (totalRecharge >= thresholds[i].threshold) {
          applicableRate = thresholds[i].rate;
        } else {
          break;
        }
      }
      return applicableRate;
    }

    function calculateCustomPrice(days, recharge, totalRechargeVal) {
      if (recharge <= 0) return 0;
      const rechargeNum = Number(recharge) || 0;
      const totalNum = Number(totalRechargeVal) || 0;
      if (days <= 7) {
        if (rechargeNum >= 10000) return rechargeNum * 6;
        if (rechargeNum >= 5000) return rechargeNum * 5;
        return rechargeNum * 4;
      } else {
        const rechargeRate = getRechargeExtraRate(rechargeNum);
        const totalRate = getTotalRechargeExtraRate(totalNum);
        const totalMultiplier = 4 + rechargeRate + totalRate;
        return Math.floor(rechargeNum * totalMultiplier);
      }
    }

    function updateCustomPriceFromInputs() {
      const daysRaw = serverDaysInput.value;
      const days = daysRaw === '' ? 0 : parseInt(daysRaw, 10) || 0;
      const rechargeRaw = rechargeAmountInput.value;
      const recharge = rechargeRaw === '' ? 0 : parseFloat(rechargeRaw) || 0;
      const totalRaw = totalRechargeInput.value;
      const totalRechargeVal = totalRaw === '' ? 0 : parseFloat(totalRaw) || 0;
      let newPrice = calculateCustomPrice(days, recharge, totalRechargeVal);
      newPrice = Math.floor(newPrice);
      customPriceInput.value = newPrice;
      return newPrice;
    }

    function getCurrentBudget() {
      let val = parseFloat(customPriceInput.value);
      if (isNaN(val)) val = 0;
      return Math.max(0, val);
    }

    function updateRemainingAndTotal() {
      const total = selectedItems.reduce((sum, i) => sum + i.价格, 0);
      totalPriceSpan.innerText = total;
      const budget = getCurrentBudget();
      const remaining = Math.max(0, budget - total);
      remainingSpan.innerText = `¥${remaining}`;
      const budgetPanel = document.getElementById('budgetPanel');
      if (total > budget && budget > 0) {
        budgetPanel.style.background = "#fff1f0";
        budgetPanel.style.borderColor = "#ffb3b0";
        remainingSpan.style.color = "#c21e1a";
      } else {
        budgetPanel.style.background = "#f9f9fb";
        budgetPanel.style.borderColor = "#e9e9ef";
        remainingSpan.style.color = "#ff3b30";
      }
    }

      if (selectedItems.length === 0) {
        selectedPreviewArea.innerHTML = '<div class="empty-message">暂无已选道具，点击上方道具添加</div>';
        updateRemainingAndTotal();
        return;
      }
      const grouped = {};
      selectedItems.forEach(item => {
        if (!grouped[item.分类]) grouped[item.分类] = [];
        grouped[item.分类].push(item);
      });
      let html = `<div class="selected-list-preview">`;
      for (let cat of Object.keys(grouped).sort()) {
        html += `<div class="selected-category">
                  <div class="selected-category-name">${escapeHtml(cat)}</div>
                  <div class="selected-items-row">`;
        grouped[cat].forEach(item => {
          html += `<span class="selected-badge" data-name="${escapeHtml(item.名称)}" data-cat="${escapeHtml(item.分类)}" data-price="${item.价格}">
                    ${escapeHtml(item.名称)}  ${item.价格}
                  </span>`;
        });
        html += `</div></div>`;
      }
      html += `</div>`;
      selectedPreviewArea.innerHTML = html;
      document.querySelectorAll('.selected-badge').forEach(el => {
        const name = el.getAttribute('data-name');
        const cat = el.getAttribute('data-cat');
        const price = parseInt(el.getAttribute('data-price'), 10);
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleItem(cat, name, price);
        });
      });
      updateRemainingAndTotal();
    }

      const daysRaw = serverDaysInput.value;
      const days = daysRaw === '' ? 0 : parseInt(daysRaw, 10) || 0;
      let filtered = itemsDatabase.filter(item => item.天数 <= days);
      const grouped = {};
      filtered.forEach(item => {
        if (!grouped[item.分类]) grouped[item.分类] = [];
        grouped[item.分类].push(item);
      });
      if (Object.keys(grouped).length === 0) {
        itemsArea.innerHTML = '<div class="empty-message">当前开服天数下无可选道具</div>';
        return;
      }
      let html = '';
      for (let cat of Object.keys(grouped).sort()) {
        html += `<div class="category-title">${cat}</div><div class="item-list">`;
        grouped[cat].forEach(item => {
          const isSelected = selectedItems.some(s => s.名称 === item.名称 && s.分类 === item.分类);
          const selectedClass = isSelected ? 'selected-item' : '';
          html += `<div class="item ${selectedClass}" data-name="${escapeHtml(item.名称)}" data-cat="${escapeHtml(item.分类)}" data-price="${item.价格}">
                    ${escapeHtml(item.名称)} <span class="price">${item.价格}</span>
                  </div>`;
        });
        html += `</div>`;
      }
      itemsArea.innerHTML = html;
      Array.from(itemsArea.querySelectorAll('.item')).forEach(el => {
        const name = el.getAttribute('data-name');
        const cat = el.getAttribute('data-cat');
        const price = parseInt(el.getAttribute('data-price'), 10);
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleItem(cat, name, price);
        });
      });
    }

    function toggleItem(cat, name, price) {
      const existingIndex = selectedItems.findIndex(i => i.名称 === name && i.分类 === cat);
      const currentBudget = getCurrentBudget();
      const currentTotal = selectedItems.reduce((sum, i) => sum + i.价格, 0);
      if (existingIndex !== -1) {
        selectedItems.splice(existingIndex, 1);
      } else {
        if (currentTotal + price > currentBudget) {
          showToastMessage('食懵你啊，没分了');
          return;
        }
        selectedItems.push({ 分类: cat, 名称: name, 价格: price });
      }
      renderAvailableItems();
      renderSelectedPreview();
    }

    function clearAllSelected() {
      if (selectedItems.length === 0) return;
      selectedItems = [];
      renderAvailableItems();
      renderSelectedPreview();
    }

    function copySelectedList() {
      if (selectedItems.length === 0) {
        showToastMessage('痴线啊，没选东西复制什么');
        return;
      }
      const grouped = {};
      selectedItems.forEach(item => {
        if (!grouped[item.分类]) grouped[item.分类] = [];
        grouped[item.分类].push(item.名称);
      });
      const lines = Object.entries(grouped).map(([cat, names]) => `${cat}：${names.join('、')}`);
      const copyText = lines.join('\n');
      navigator.clipboard.writeText(copyText).then(() => {
        showToastMessage('复制成功');
      }).catch(() => {
        showToastMessage('复制失败，请手动复制');
      });
    }

    function showToastMessage(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function refreshAll() {
      renderAvailableItems();
      renderSelectedPreview();
    }

    function bindEvents() {
      document.getElementById('searchBtn').addEventListener('click', () => {
        refreshAll();
      });
      document.getElementById('clearSelectedBtn').addEventListener('click', clearAllSelected);
      document.getElementById('copyListBtn').addEventListener('click', copySelectedList);

      const autoUpdateFields = [serverDaysInput, rechargeAmountInput, totalRechargeInput];
      autoUpdateFields.forEach(field => {
        field.addEventListener('input', () => {
          updateCustomPriceFromInputs();
          refreshAll();
        });
      });
      customPriceInput.addEventListener('input', () => {
        refreshAll();
      });
    }

    function init() {
      updateCustomPriceFromInputs();
      bindEvents();
      refreshAll();
    }

    init();
  })();
</script>
</body>
</html>
