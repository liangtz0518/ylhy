        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "微软雅黑", sans-serif;
            background: #f9fafb;
            padding: 30px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #4a90e2, #3a5a9f);
            border-radius: 12px;
            color: white;
            margin-bottom: 30px;
        }
        .panels {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        .panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 280px;
            border: 1px solid #e1e4e8;
        }
        .panel.roles-panel { max-width: 300px; }
        .panel-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e1e4e8;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, textarea, select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .btn {
            background: linear-gradient(135deg, #3a5a9f, #4a90e2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 8px;
            margin-bottom: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-outline { background: transparent; border: 1px solid #3a5a9f; color: #3a5a9f; }
        .btn-danger { background: linear-gradient(135deg, #d32f2f, #e57373); }
        .search-results {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-top: 8px;
            display: none;
        }
        .result-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        .result-item.selected { background: #e6f0ff; }
        .selected-item {
            background: #f8f9fa;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .quantity-input { width: 80px; text-align: center; }
        #generatedCode {
            background: #f8fafc;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 12px;
            max-height: 300px;
            overflow: auto;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .package-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            margin-bottom: 8px;
            border-radius: 6px;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #3a5a9f;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            display: none;
            z-index: 2000;
        }
        .action-group { margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .help-text { font-size: 13px; color: #666; margin-bottom: 15px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container">
    <header><h1>逍遥蜀山</h1><p>配置区服/角色ID，选择道具，生成自动填充代码</p></header>
    <div class="panels">
        <!-- 常用角色 -->
        <div class="panel roles-panel">
            <div class="panel-title"><i class="fas fa-users"></i> 常用角色ID</div>
            <button class="btn" onclick="openAddRoleModal()"><i class="fas fa-plus"></i> 添加</button>
            <div id="frequentlyUsedRoles" style="margin-top: 15px;"></div>
        </div>
        <!-- 配置参数 -->
        <div class="panel">
            <div class="panel-title"><i class="fas fa-cogs"></i> 配置参数</div>
            <div class="form-group">
                <label>角色区服</label>
                <input type="text" id="playerServer" placeholder="例如: 183服">
            </div>
            <div class="form-group">
                <label>角色ID (多个用逗号分隔)</label>
                <textarea id="playerIds" rows="2" placeholder="例如: 1001,1002"></textarea>
            </div>
            <div class="form-group">
                <label>搜索道具</label>
                <input type="text" id="itemSearch" placeholder="ID或名称" oninput="searchItems()">
                <div class="search-results" id="searchResults"></div>
                <div class="action-group">
                    <button class="btn" onclick="selectAllResults()">全选</button>
                    <button class="btn btn-outline" onclick="deselectAllResults()">全不选</button>
                    <button class="btn" onclick="addSelectedResults()">添加选中</button>
                </div>
                <div style="display: flex; gap: 8px; margin-top: 8px;">
                    <input type="number" id="bulkQuantity" placeholder="批量数量" min="1" style="flex:1">
                    <button class="btn" onclick="applyBulkQuantity()">批量设置</button>
                </div>
            </div>
            <div class="action-group">
                <div class="action-group-title">单日累充礼包 (可多选)</div>
                <button class="btn" onclick="openPackageModal('第1天礼包')">第1天</button>
                <button class="btn" onclick="openPackageModal('第2天礼包')">第2天</button>
                <button class="btn" onclick="openPackageModal('第3天礼包')">第3天</button>
                <button class="btn" onclick="openPackageModal('第4天礼包')">第4天</button>
                <button class="btn" onclick="openPackageModal('第5天礼包')">第5天</button>
                <button class="btn" onclick="openPackageModal('第6天礼包')">第6天</button>
                <button class="btn" onclick="openPackageModal('第7天礼包')">第7天</button>
                <button class="btn" onclick="openPackageModal('第8天及以后礼包')">第8天+</button>
                <button class="btn" onclick="openPackageModal('其他')">其他</button>
                <button class="btn btn-outline" onclick="clearItems()">清空道具</button>
            </div>
            <div id="selectedItemsContainer"></div>
        </div>
        <!-- 预设管理 -->
        <div class="panel">
            <div class="panel-title"><i class="fas fa-bookmark"></i> 预设管理</div>
            <div class="action-group">
                <button class="btn" onclick="openSavePresetModal()">保存</button>
                <button class="btn btn-outline" onclick="exportPresets()">导出</button>
                <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">导入</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importPresets(event)">
            </div>
            <div id="presetList"></div>
        </div>
        <!-- 生成代码 -->
        <div class="panel">
            <div class="panel-title"><i class="fas fa-code"></i> 生成代码</div>
            <div class="help-text">
                <p>1. 填写区服和角色ID<br>2. 添加道具并设置数量<br>3. 点击生成代码，复制到游戏后台F12控制台执行<br>4. 道具超过10个自动分批，每次提交后自动继续</p>
            </div>
            <button class="btn" onclick="generateCode()">生成填充代码</button>
            <button class="btn btn-outline" onclick="copyCode()">复制代码</button>
            <button class="btn btn-danger" onclick="clearAll()">重置所有</button>
            <div id="generatedCode">// 点击生成按钮</div>
        </div>
    </div>
</div>

<!-- 模态框 -->
<div id="addRoleModal" class="modal">
    <div class="modal-content">
        <h3>添加常用角色</h3>
        <input type="text" id="server" placeholder="区服" style="width:100%; margin-bottom:10px">
        <input type="text" id="roleName" placeholder="角色名" style="width:100%; margin-bottom:10px">
        <input type="text" id="roleId" placeholder="角色ID" style="width:100%; margin-bottom:10px">
        <div style="text-align:right">
            <button class="btn btn-outline" onclick="closeModal('addRoleModal')">取消</button>
            <button class="btn" onclick="saveRole()">保存</button>
        </div>
    </div>
</div>
<div id="packageModal" class="modal">
    <div class="modal-content">
        <h3>选择礼包 (可多选)</h3>
        <div id="packageOptionsContainer"></div>
        <div style="text-align:right; margin-top:15px">
            <button class="btn btn-outline" onclick="closeModal('packageModal')">取消</button>
            <button class="btn" onclick="confirmPackageSelection()">确定</button>
        </div>
    </div>
</div>
<div id="savePresetModal" class="modal">
    <div class="modal-content">
        <h3>保存预设</h3>
        <input type="text" id="presetName" placeholder="预设名称" style="width:100%">
        <div style="text-align:right; margin-top:15px">
            <button class="btn btn-outline" onclick="closeModal('savePresetModal')">取消</button>
            <button class="btn" onclick="saveCurrentPreset()">保存</button>
        </div>
    </div>
</div>
<div id="notification" class="notification"></div>

// ---------- 通用 ----------
function showMsg(msg, isError=false) {
    let n = document.getElementById('notification');
    n.textContent = msg;
    n.className = 'notification' + (isError ? ' error' : '');
    n.style.display = 'flex';
    setTimeout(() => n.style.display = 'none', 2500);
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function openModal(id) { document.getElementById(id).style.display = 'flex'; }

// 常用角色
function getRoles() { return JSON.parse(localStorage.getItem('frequentlyUsedRoles2') || '[]'); }
function saveRoles(r) { localStorage.setItem('frequentlyUsedRoles2', JSON.stringify(r)); }
function renderRoles() {
    let roles = getRoles();
    let container = document.getElementById('frequentlyUsedRoles');
    if(!roles.length) { container.innerHTML = '<div style="color:#999">暂无常用角色</div>'; return; }
    container.innerHTML = roles.map(r => `
        <div class="selected-item" onclick="if(!event.target.closest('.btn')){document.getElementById('playerServer').value='${r.server}';document.getElementById('playerIds').value='${r.id}';showMsg('已选择 ${r.server}-${r.name}');}">
            <div><div>${r.server}-${r.name}</div><small>${r.id}</small></div>
            <button class="btn btn-danger" onclick="deleteRole('${r.id}')" style="padding:2px 8px"><i class="fas fa-times"></i></button>
        </div>
    `).join('');
}
function openAddRoleModal() { openModal('addRoleModal'); }
function saveRole() {
    let server = document.getElementById('server').value.trim();
    let name = document.getElementById('roleName').value.trim();
    let id = document.getElementById('roleId').value.trim();
    if(!server||!name||!id) return showMsg('请完整填写', true);
    let roles = getRoles();
    let idx = roles.findIndex(r=>r.id===id);
    if(idx>=0) roles[idx] = {server,name,id};
    else roles.push({server,name,id});
    saveRoles(roles);
    renderRoles();
    closeModal('addRoleModal');
    showMsg('角色已保存');
}
function deleteRole(id) {
    let roles = getRoles().filter(r=>r.id!==id);
    saveRoles(roles);
    renderRoles();
    showMsg('已删除');
}

// 道具搜索
function searchItems() {
    let kw = document.getElementById('itemSearch').value.trim().toLowerCase();
    let container = document.getElementById('searchResults');
    if(!kw) { container.style.display='none'; selectedSearchIds=[]; return; }
    searchResults = itemDatabase.filter(i=>i.id.includes(kw)||i.name.includes(kw));
    container.style.display = 'block';
    container.innerHTML = searchResults.map(i => `
        <div class="result-item ${selectedSearchIds.includes(i.id)?'selected':''}" onclick="toggleSelectItem('${i.id}')">
            <span><span class="item-id">${i.id}</span> ${i.name}</span>
            ${selectedSearchIds.includes(i.id)?'<i class="fas fa-check"></i>':''}
        </div>
    `).join('');
}
function toggleSelectItem(id) {
    if(selectedSearchIds.includes(id)) selectedSearchIds = selectedSearchIds.filter(i=>i!==id);
    else selectedSearchIds.push(id);
    searchItems();
}
function selectAllResults() { selectedSearchIds = searchResults.map(i=>i.id); searchItems(); }
function deselectAllResults() { selectedSearchIds = []; searchItems(); }
function addSelectedResults() {
    selectedSearchIds.forEach(id => {
        let item = itemDatabase.find(i=>i.id===id);
        if(item && !selectedItems.find(s=>s.id===id)) selectedItems.push({id:item.id, name:item.name, quantity:1});
    });
    selectedSearchIds = [];
    searchItems();
    renderSelectedItems();
    showMsg('已添加选中道具');
}
function renderSelectedItems() {
    let container = document.getElementById('selectedItemsContainer');
    if(!selectedItems.length) { container.innerHTML = '<div style="color:#999">暂无道具</div>'; return; }
    container.innerHTML = selectedItems.map(item => `
        <div class="selected-item">
            <div><strong>${item.id}</strong> ${item.name}</div>
            <div class="item-actions">
                <input type="number" class="quantity-input" min="1" value="${item.quantity}" onchange="updateQuantity('${item.id}',this.value)">
                <button class="btn btn-danger" onclick="removeItem('${item.id}')" style="padding:2px 8px"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    `).join('');
}
function updateQuantity(id, val) { let it = selectedItems.find(i=>i.id===id); if(it) it.quantity = Math.max(1, parseInt(val)||1); renderSelectedItems(); }
function removeItem(id) { selectedItems = selectedItems.filter(i=>i.id!==id); renderSelectedItems(); }
function applyBulkQuantity() {
    let qty = parseInt(document.getElementById('bulkQuantity').value);
    if(isNaN(qty)||qty<1) return;
    selectedItems.forEach(i=>i.quantity=qty);
    renderSelectedItems();
    showMsg(`批量设置数量为 ${qty}`);
}
function clearItems() { if(confirm('清空所有道具？')){ selectedItems=[]; renderSelectedItems(); } }

// 礼包多选
function openPackageModal(type) {
    currentPackageType = type;
    selectedPackageIds = [];
    let packages = packageDatabase[type] || [];
    let container = document.getElementById('packageOptionsContainer');
    if(!packages.length) { container.innerHTML = '<div>暂无礼包</div>'; openModal('packageModal'); return; }
    container.innerHTML = packages.map(pkg => `
        <div class="package-option" onclick="togglePackage('${pkg.id}')">
            <input type="checkbox" id="chk_${pkg.id}" onchange="togglePackageById('${pkg.id}')" style="width:18px;height:18px">
            <div><strong>${pkg.name}</strong><br><small>${pkg.items.length}个道具</small></div>
        </div>
    `).join('');
    openModal('packageModal');
}
function togglePackage(id) { let cb = document.getElementById(`chk_${id}`); cb.checked = !cb.checked; togglePackageById(id); }
function togglePackageById(id) {
    let cb = document.getElementById(`chk_${id}`);
    if(cb.checked) { if(!selectedPackageIds.includes(id)) selectedPackageIds.push(id); }
    else selectedPackageIds = selectedPackageIds.filter(i=>i!==id);
}
function confirmPackageSelection() {
    if(!currentPackageType || selectedPackageIds.length===0) return showMsg('请至少选择一个礼包', true);
    let packages = packageDatabase[currentPackageType] || [];
    let selectedPkgs = packages.filter(p=>selectedPackageIds.includes(p.id));
    let itemMap = new Map();
    selectedPkgs.forEach(pkg => {
        pkg.items.forEach(it => {
            if(itemMap.has(it.id)) itemMap.get(it.id).quantity += it.quantity;
            else itemMap.set(it.id, {...it});
        });
    });
    let merged = Array.from(itemMap.values());
    merged.forEach(newIt => {
        let exist = selectedItems.find(i=>i.id===newIt.id);
        if(exist) exist.quantity += newIt.quantity;
        else selectedItems.push({id:newIt.id, name:newIt.name, quantity:newIt.quantity});
    });
    renderSelectedItems();
    closeModal('packageModal');
    showMsg(`已添加${merged.length}个道具`);
}

// 预设管理
function getPresets() { return JSON.parse(localStorage.getItem('customPresets2') || '[]'); }
function savePresets(p) { localStorage.setItem('customPresets2', JSON.stringify(p)); }
function renderPresets() {
    let presets = getPresets();
    let container = document.getElementById('presetList');
    if(!presets.length) { container.innerHTML = '<div style="color:#999">暂无预设</div>'; return; }
    container.innerHTML = presets.map(p => `
        <div class="selected-item" style="flex-direction:column; align-items:stretch">
            <div><strong>${p.name}</strong> (${p.items.length}个道具)</div>
            <div style="margin-top:8px">
                <button class="btn btn-outline" onclick="loadPreset('${p.id}')">加载</button>
                <button class="btn btn-danger" onclick="deletePreset('${p.id}')">删除</button>
            </div>
        </div>
    `).join('');
}
function openSavePresetModal() {
    if(!selectedItems.length) return showMsg('请先添加道具', true);
    document.getElementById('presetName').value = '';
    openModal('savePresetModal');
}
function saveCurrentPreset() {
    let name = document.getElementById('presetName').value.trim();
    if(!name) return showMsg('请输入预设名称', true);
    let presets = getPresets();
    let newId = Date.now().toString();
    presets.push({id:newId, name:name, items:JSON.parse(JSON.stringify(selectedItems))});
    savePresets(presets);
    renderPresets();
    closeModal('savePresetModal');
    showMsg('预设已保存');
}
function loadPreset(id) {
    let presets = getPresets();
    let p = presets.find(p=>p.id===id);
    if(p) { selectedItems = JSON.parse(JSON.stringify(p.items)); renderSelectedItems(); showMsg(`已加载预设: ${p.name}`); }
}
function deletePreset(id) {
    if(!confirm('删除预设？')) return;
    let presets = getPresets().filter(p=>p.id!==id);
    savePresets(presets);
    renderPresets();
    showMsg('已删除');
}
function exportPresets() {
    let presets = getPresets();
    if(!presets.length) return showMsg('无预设可导出', true);
    let blob = new Blob([JSON.stringify(presets,null,2)], {type:'application/json'});
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `presets_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showMsg('导出成功');
}
function importPresets(event) {
    let file = event.target.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = e => {
        try {
            let imported = JSON.parse(e.target.result);
            if(!Array.isArray(imported)) throw new Error();
            let valid = imported.filter(p=>p.id && p.name && Array.isArray(p.items));
            let current = getPresets();
            let merged = [...current];
            valid.forEach(v => {
                let idx = merged.findIndex(m=>m.id===v.id);
                if(idx>=0) merged[idx]=v;
                else merged.push(v);
            });
            savePresets(merged);
            renderPresets();
            showMsg(`导入${valid.length}个预设`);
        } catch(e) { showMsg('文件格式错误', true); }
        event.target.value = '';
    };
    reader.readAsText(file);
}

// 生成代码 (分批脚本)
function generateCode() {
    let server = document.getElementById('playerServer').value.trim();
    let ids = document.getElementById('playerIds').value.trim();
    if(!server) return showMsg('请填写区服', true);
    if(!ids) return showMsg('请填写角色ID', true);
    if(!selectedItems.length) return showMsg('请添加道具', true);
    let itemsStr = selectedItems.map(i => `  ['${i.id}', ${i.quantity}]`).join(',\n');
    let script = `// 邮件分批填充脚本（自动平台+区服选择，超过10个自动分批）
(function(){
    const TARGET_SERVER='${server}';
    const ROLE_ID='${ids}';
    const MAIL_TITLE='1';
    const MAIL_CONTENT='1';
    const BATCH_SIZE=10;
    const ITEMS=[
${itemsStr}
    ];
    let currentIndex=0, submitListener=null, initialized=false;
    function trigger(el){ if(!el)return; el.dispatchEvent(new Event('input',{bubbles:true})); el.dispatchEvent(new Event('change',{bubbles:true})); el.dispatchEvent(new Event('blur',{bubbles:true})); }
    function selectServerExact(placeholder,keyword){
        let input=document.querySelector(\`.el-select input.el-input__inner[placeholder="\${placeholder}"]\`);
        if(!input) return false;
        input.click();
        let opts=document.querySelectorAll('.el-select-dropdown__item');
        if(!opts.length) return false;
        let match=keyword.replace(/\\D/g,'')+'服';
        let target=null;
        for(let opt of opts) if(opt.textContent.trim().startsWith(match)) { target=opt; break; }
        if(target) { target.click(); trigger(input); console.log('已选区服:',target.textContent.trim()); }
        else { opts[0].click(); trigger(input); }
        return true;
    }
    function selectFirstDropdown(placeholder){
        let input=document.querySelector(\`.el-select input.el-input__inner[placeholder="\${placeholder}"]\`);
        if(!input) return false;
        input.click();
        let opts=document.querySelectorAll('.el-select-dropdown__item');
        if(opts.length) { opts[0].click(); trigger(input); }
        return true;
    }
    async function clearRows(){ let btns=document.querySelectorAll('button.el-button--danger.el-button--small.is-plain.is-circle'); for(let i=btns.length-1;i>=0;i--){ btns[i].click(); await new Promise(r=>setTimeout(r,30)); } }
    async function setRows(n){ let add=document.querySelector('button.el-button--primary.el-button--small.is-circle'); let cur=document.querySelectorAll('tr.el-table__row').length; if(cur===n)return; if(cur>n){ let del=document.querySelectorAll('button.el-button--danger.el-button--small.is-plain.is-circle'); for(let i=0;i<cur-n;i++) del[del.length-1-i]?.click(); } else for(let i=0;i<n-cur;i++) add.click(); await new Promise(r=>setTimeout(r,50)); }
    async function fillBatch(){
        let rem=ITEMS.length-currentIndex; if(rem<=0){ console.log('🎉 完成'); if(submitListener) document.querySelector('button.el-button--primary.el-button--default')?.removeEventListener('click',submitListener); return false; }
        let cnt=Math.min(BATCH_SIZE,rem);
        console.log(\`📦 第\${Math.floor(currentIndex/BATCH_SIZE)+1}批，\${cnt}个道具，剩余\${rem-cnt}\`);
        await clearRows(); await setRows(cnt);
        let idIns=document.querySelectorAll('input[placeholder="请输入道具ID"]'), qtyIns=document.querySelectorAll('input[placeholder="请输入数量"]');
        for(let i=0;i<cnt;i++){ let idx=currentIndex+i; if(idIns[i]){ idIns[i].value=ITEMS[idx][0]; trigger(idIns[i]); } if(qtyIns[i]){ qtyIns[i].value=ITEMS[idx][1]; trigger(qtyIns[i]); } }
        currentIndex+=cnt;
        if(currentIndex>=ITEMS.length){ console.log('✅ 全部完成'); if(submitListener) document.querySelector('button.el-button--primary.el-button--default')?.removeEventListener('click',submitListener); return false; }
        console.log(\`✅ 已填充\${currentIndex}/\${ITEMS.length}，请点击“提交”继续\`);
        return true;
    }
    async function onSubmit(){ console.log('提交触发，继续下一批'); await new Promise(r=>setTimeout(r,1500)); let more=await fillBatch(); if(!more && submitListener) document.querySelector('button.el-button--primary.el-button--default')?.removeEventListener('click',submitListener); }
    async function init(){
        if(initialized)return;
        selectFirstDropdown('平台'); await new Promise(r=>setTimeout(r,80));
        selectServerExact('区服',TARGET_SERVER); await new Promise(r=>setTimeout(r,100));
        let pid=document.querySelector('textarea[placeholder="角色ID(多个玩家,分割)"]'); if(pid){ pid.value=ROLE_ID; trigger(pid); }
        let title=document.querySelector('input[placeholder="请填写标题信息"]'); if(title){ title.value=MAIL_TITLE; trigger(title); }
        let content=document.querySelector('textarea[placeholder="邮件内容"]'); if(content){ content.value=MAIL_CONTENT; trigger(content); }
        await new Promise(r=>setTimeout(r,80));
        initialized=true;
        await fillBatch();
        let btn=document.querySelector('button.el-button--primary.el-button--default');
        if(btn && !submitListener){ submitListener=onSubmit; btn.addEventListener('click',submitListener); console.log('监听提交按钮'); }
    }
    init();
})();`;
    document.getElementById('generatedCode').innerText = script;
    showMsg('代码已生成');
}
function copyCode() {
    let code = document.getElementById('generatedCode').innerText;
    navigator.clipboard.writeText(code).then(()=>showMsg('已复制')).catch(()=>showMsg('复制失败',true));
}
function clearAll() {
    if(confirm('重置所有内容？')) {
        document.getElementById('playerServer').value = '';
        document.getElementById('playerIds').value = '';
        selectedItems = [];
        renderSelectedItems();
        document.getElementById('itemSearch').value = '';
        document.getElementById('searchResults').style.display = 'none';
        document.getElementById('generatedCode').innerText = '// 点击生成按钮';
        showMsg('已重置');
    }
}

// 初始化渲染
renderRoles();
renderSelectedItems();
renderPresets();
</script>
